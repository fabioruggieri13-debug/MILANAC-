<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC PRO CLUB - GESTIONALE COMPLETO</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --rosso: #C61C23;
            --oro: #D4AF37;
            --nero: #000;
            --grigio-scuro: #151515;
            --grigio-light: #222;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; 
            background: var(--nero); 
            color: white; 
            font-family: 'Roboto', sans-serif; 
            overflow: hidden; 
            height: 100vh; 
        }

        /* INTRO ANIMATA */
        #intro { 
            position: fixed; 
            inset: 0; 
            background: radial-gradient(circle at center, #200000 0%, #000 100%); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 10000; 
        }
        .pulsing-title { 
            font-size: 4rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            font-family: 'Orbitron';
            color: var(--oro);
            text-shadow: 0 0 20px var(--rosso);
            margin-bottom: 20px;
        }

        /* HEADER */
        header { 
            height: 65px; 
            border-bottom: 2px solid var(--rosso); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 20px; 
            background: #000; 
            position: sticky;
            top: 0;
            z-index: 2000;
        }

        /* SIDEBAR NAV */
        .sidebar { 
            position: fixed; 
            top: 0; 
            right: -100%; 
            width: 280px; 
            height: 100%; 
            background: rgba(5,5,5,0.98); 
            transition: 0.4s ease-in-out; 
            z-index: 3000; 
            border-left: 2px solid var(--rosso); 
            padding-top: 60px; 
        }
        .sidebar.active { right: 0; }
        .sidebar button { 
            width: 100%; 
            padding: 20px; 
            background: none; 
            border: none; 
            color: white; 
            text-align: left; 
            font-size: 16px;
            font-weight: bold; 
            border-bottom: 1px solid #222; 
            text-transform: uppercase; 
        }

        /* CONTAINER PRINCIPALE */
        .container { 
            height: calc(100vh - 65px); 
            overflow-y: auto; 
            padding: 15px; 
            padding-bottom: 80px; 
        }
        .page { display: none; } 
        .page.active { display: block; }

        /* --- STYLE ROSA IDENTICO ALLA FOTO --- */
        .card { 
            background: linear-gradient(145deg, #181818, #050505); 
            padding: 22px 20px; 
            margin-bottom: 15px; 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            border-radius: 18px; 
            position: relative; 
            overflow: hidden; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        /* Il numero gigante sullo sfondo */
        .bg-number {
            position: absolute;
            right: -15px;
            bottom: -40px;
            font-size: 160px; 
            font-weight: 900;
            font-style: italic;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(to bottom, rgba(212, 175, 55, 0.1), transparent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: 0;
            pointer-events: none;
            line-height: 1;
        }

        .card-left { position: relative; z-index: 1; }
        .role-badge { 
            color: var(--oro); 
            font-weight: 800; 
            font-size: 14px; 
            letter-spacing: 1px;
            text-transform: uppercase; 
            display: block; 
        }
        .player-name-new { 
            font-size: 26px; 
            font-weight: 900; 
            color: white; 
            font-family: 'Roboto', sans-serif;
            text-transform: uppercase;
            margin: 2px 0;
        }
        .player-sub { 
            color: #888; 
            font-size: 13px; 
            font-weight: 600; 
            text-transform: uppercase;
        }

        .btn-status { 
            padding: 14px 20px; 
            border-radius: 12px; 
            border: none; 
            font-weight: 900; 
            font-size: 12px; 
            text-transform: uppercase;
            min-width: 110px;
            z-index: 2;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* CAMPO TATTICO COMPLETO */
        #pitch { 
            width: 100%; aspect-ratio: 2/3; background: #2e7d32; 
            border: 4px solid #fff; position: relative; border-radius: 10px;
            background-image: repeating-linear-gradient(0deg, #1b5e20, #1b5e20 10%, #2e7d32 10%, #2e7d32 20%);
            margin-top: 10px;
        }
        .mid-line { position: absolute; top: 50%; width: 100%; height: 2px; background: white; }
        .mid-circle { position: absolute; top: 50%; left: 50%; width: 80px; height: 80px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); }
        
        .player { position: absolute; width: 60px; text-align: center; z-index: 100; transform: translate(-50%, -50%); }
        .jersey { 
            width: 48px; height: 48px; background: #000; border: 3px solid var(--rosso); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; color: var(--oro); font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .p-name { 
            background: rgba(0,0,0,0.8); color: white; font-size: 10px; 
            padding: 2px 5px; border-radius: 5px; margin-top: 5px; 
            display: inline-block; font-weight: bold; text-transform: uppercase; 
        }

        /* MODALE DETTAGLI */
        #modal-player { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.96); 
            z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content { 
            background: #111; border: 2px solid var(--oro); border-radius: 20px; 
            padding: 30px; width: 100%; max-width: 400px; text-align: center; 
        }

        /* ADMIN & INPUT */
        .admin-section { background: #111; padding: 15px; border-radius: 15px; margin-bottom: 20px; border-left: 4px solid var(--rosso); }
        input, select, textarea { 
            width: 100%; padding: 15px; margin: 10px 0; background: #1a1a1a; 
            border: 1px solid #333; color: white; border-radius: 8px; font-size: 16px;
        }
        .btn-main { 
            width: 100%; padding: 16px; background: var(--rosso); color: white; 
            border: none; font-weight: 900; border-radius: 10px; text-transform: uppercase; 
            cursor: pointer; margin-top: 10px;
        }
        .vote-row { display: flex; align-items: center; justify-content: space-between; background: #222; padding: 12px; border-radius: 10px; margin: 10px 0; }
        .v-btn { width: 40px; height: 40px; background: #444; border: none; color: white; border-radius: 50%; font-weight: bold; font-size: 20px; }

    </style>
</head>
<body>

    <div id="intro">
        <h1 class="pulsing-title">MILANAC</h1>
        <p style="letter-spacing: 5px; font-weight: 300;">PRO CLUB MANAGER 2026</p>
        <button class="btn-main" style="width: 220px; margin-top: 40px;" onclick="document.getElementById('intro').style.display='none'">ACCEDI AL CLUB</button>
    </div>

    <header>
        <div style="font-family:'Orbitron'; font-weight:900; color:var(--rosso); font-size:24px;">MILANAC</div>
        <div id="menu-trigger" onclick="document.querySelector('.sidebar').classList.add('active')" style="font-size:32px; color:var(--rosso); cursor:pointer;">☰</div>
    </header>

    <nav class="sidebar">
        <button onclick="go('rosa')">🛡️ LA ROSA</button>
        <button onclick="go('tattica')">📋 TATTICA E MODULI</button>
        <button onclick="go('news')">📰 NEWS E COMUNICATI</button>
        <button onclick="go('calendario')">📅 CALENDARIO</button>
        <button onclick="go('partite')">🏟️ RISULTATI MATCH</button>
        <button onclick="go('mercato')">💰 VALORI MERCATO</button>
        <button onclick="go('premi')">🏆 HALL OF FAME</button>
        <button onclick="checkAdmin()" style="color:var(--oro); border-top: 2px solid var(--oro); margin-top: 20px;">⚙️ AREA ADMIN</button>
        <button onclick="document.querySelector('.sidebar').classList.remove('active')" style="color:red; text-align: center;">CHIUDI</button>
    </nav>

    <div class="container">
        
        <div id="p-rosa" class="page active">
            <h2 style="font-family:'Orbitron'; font-size: 18px; color: var(--oro); margin-bottom: 20px;">CAMPIONI IN CARICA</h2>
            <div id="l-rosa"></div>
        </div>

        <div id="p-tattica" class="page">
            <label>Scegli Modulo:</label>
            <select id="mod-select" onchange="cambiaModulo(this.value)">
                <option value="4-4-2">4-4-2 (Standard)</option>
                <option value="4-3-3">4-3-3 (Offensivo)</option>
                <option value="3-5-2">3-5-2 (Bilanciato)</option>
                <option value="5-3-2">5-3-2 (Difensivo)</option>
            </select>
            <div id="pitch">
                <div class="mid-line"></div>
                <div class="mid-circle"></div>
                <div id="pitch-players"></div>
            </div>
        </div>

        <div id="p-news" class="page">
            <h2 style="color:var(--oro)">ULTIME DAL CLUB</h2>
            <div id="l-news"></div>
        </div>

        <div id="p-admin" class="page">
            <div class="admin-section">
                <h3>GESTIONE GIOCATORI</h3>
                <input type="text" id="new-name" placeholder="Nome Giocatore">
                <input type="number" id="new-num" placeholder="Numero Maglia">
                <select id="new-role">
                    <option>POR</option><option>DIF</option><option>CEN</option><option>ATT</option>
                </select>
                <button class="btn-main" onclick="aggiungiGiocatore()">AGGIUNGI ALLA ROSA</button>
            </div>

            <div class="admin-section">
                <h3>VOTAZIONI ADMIN</h3>
                <select id="admin-selector" onchange="renderAll()">
                    <option value="Fabio">Fabio</option>
                    <option value="Beppe">Beppe</option>
                    <option value="Christian">Christian</option>
                    <option value="Vicio">Vicio</option>
                    <option value="Martin">Martin</option>
                </select>
                <div id="l-admin-players"></div>
            </div>

            <div class="admin-section">
                <h3>COMUNICATI E MATCH</h3>
                <textarea id="admin-news" placeholder="Scrivi una news..."></textarea>
                <button class="btn-main" onclick="pubblicaNews()">INVIA COMUNICATO</button>
            </div>
        </div>

        <div id="p-calendario" class="page"><h3>PROSSIMI IMPEGNI</h3><div id="l-cal"></div></div>
        <div id="p-partite" class="page"><h3>STORICO RISULTATI</h3><div id="l-match"></div></div>
        <div id="p-mercato" class="page"><h3>VALUTAZIONI DI MERCATO</h3><div id="l-mkt"></div></div>
        <div id="p-premi" class="page"><h3>PREMI STAGIONALI</h3><div id="l-awards"></div></div>

    </div>

    <div id="modal-player" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h1 id="modal-name" style="font-family:'Orbitron'; color:var(--oro);"></h1>
            <div id="modal-stats" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin: 20px 0;"></div>
            <button class="btn-main" onclick="document.getElementById('modal-player').style.display='none'">CHIUDI</button>
        </div>
    </div>

    <script>
        // CONFIGURAZIONE FIREBASE (Usa i tuoi dati)
        const firebaseConfig = {
            apiKey: "AIzaSyDbO_AxHKz1avQpYscoSSLpEfmFaL8MRGg",
            authDomain: "milanac-proclub.firebaseapp.com",
            projectId: "milanac-proclub",
            storageBucket: "milanac-proclub.firebasestorage.app",
            messagingSenderId: "61702234008",
            appId: "1:61702234008:web:aa597d8600d0a8251895ed"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let dbData = { players: [], news: [], matches: [], modulo: '4-4-2' };

        // COORDINATE MODULI
        const schemi = {
            '4-4-2': [{x:50,y:90},{x:15,y:70},{x:40,y:72},{x:60,y:72},{x:85,y:70},{x:15,y:40},{x:40,y:45},{x:60,y:45},{x:85,y:40},{x:35,y:15},{x:65,y:15}],
            '4-3-3': [{x:50,y:90},{x:15,y:70},{x:38,y:72},{x:62,y:72},{x:85,y:70},{x:30,y:45},{x:50,y:50},{x:70,y:45},{x:20,y:20},{x:50,y:12},{x:80,y:20}]
        };

        // ASCOLTO DATABASE
        db.collection("club").doc("main_data").onSnapshot(doc => {
            if(doc.exists) {
                dbData = doc.data();
                renderAll();
            }
        });

        async function sync() {
            await db.collection("club").doc("main_data").set(dbData);
        }

        function go(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p-' + pageId).classList.add('active');
            document.querySelector('.sidebar').classList.remove('active');
        }

        function checkAdmin() {
            const p = prompt("Inserisci Password Admin:");
            if(p === "milanac") go('admin');
            else alert("Accesso Negato");
        }

        // AGGIUNGI GIOCATORE
        function aggiungiGiocatore() {
            const n = document.getElementById('new-name').value;
            const m = document.getElementById('new-num').value;
            const r = document.getElementById('new-role').value;
            if(!n || !m) return;

            const nuovo = {
                id: Date.now(),
                nome: n,
                numero: m,
                ruolo: r,
                voti: { "Fabio":6, "Beppe":6, "Christian":6, "Vicio":6, "Martin":6 },
                gol: 0, assist: 0, mvp: 0,
                convocato: false,
                x: 50, y: 90
            };

            dbData.players.push(nuovo);
            sync();
        }

        function toggleConvocato(id) {
            const idx = dbData.players.findIndex(p => p.id === id);
            dbData.players[idx].convocato = !dbData.players[idx].convocato;
            sync();
        }

        function cambiaVoto(id, admin, delta) {
            const idx = dbData.players.findIndex(p => p.id === id);
            dbData.players[idx].voti[admin] = parseFloat((dbData.players[idx].voti[admin] + delta).toFixed(1));
            sync();
        }

        function renderAll() {
            const lRosa = document.getElementById('l-rosa');
            const lAdmin = document.getElementById('l-admin-players');
            const lPitch = document.getElementById('pitch-players');
            const currentAdmin = document.getElementById('admin-selector').value;

            lRosa.innerHTML = "";
            lAdmin.innerHTML = "";
            lPitch.innerHTML = "";

            dbData.players.forEach(p => {
                // Calcolo Media
                const votiArr = Object.values(p.voti);
                const media = (votiArr.reduce((a,b) => a+b, 0) / votiArr.length).toFixed(1);

                // HTML ROSA (IDENTICA ALLA TUA FOTO)
                lRosa.innerHTML += `
                    <div class="card">
                        <div class="bg-number">${p.numero}</div>
                        <div class="card-left" onclick="showDettagli(${p.id})">
                            <span class="role-badge">${p.ruolo}</span>
                            <h2 class="player-name-new">${p.nome}</h2>
                            <span class="player-sub">MAGLIA #${p.numero} • MEDIA ${media}</span>
                        </div>
                        <div class="card-right">
                            <button class="btn-status" 
                                style="background:${p.convocato ? '#2e7d32' : '#C61C23'}; color:white;"
                                onclick="toggleConvocato(${p.id})">
                                ${p.convocato ? 'IN CAMPO' : 'SCHIERA'}
                            </button>
                        </div>
                    </div>
                `;

                // HTML ADMIN
                lAdmin.innerHTML += `
                    <div class="vote-row">
                        <span><b>${p.nome}</b> (${p.voti[currentAdmin]})</span>
                        <div>
                            <button class="v-btn" onclick="cambiaVoto(${p.id}, '${currentAdmin}', -0.5)">-</button>
                            <button class="v-btn" onclick="cambiaVoto(${p.id}, '${currentAdmin}', 0.5)">+</button>
                        </div>
                    </div>
                `;

                // HTML PITCH
                if(p.convocato) {
                    lPitch.innerHTML += `
                        <div class="player" style="left:${p.x}%; top:${p.y}%;">
                            <div class="jersey">${p.numero}</div>
                            <div class="p-name">${p.nome}</div>
                        </div>
                    `;
                }
            });
        }

        function showDettagli(id) {
            const p = dbData.players.find(x => x.id === id);
            document.getElementById('modal-name').innerText = p.nome;
            document.getElementById('modal-stats').innerHTML = `
                <div class="card" style="margin:0; flex-direction:column;"><span>⚽ GOL</span><b>${p.gol}</b></div>
                <div class="card" style="margin:0; flex-direction:column;"><span>👟 ASSIST</span><b>${p.assist}</b></div>
            `;
            document.getElementById('modal-player').style.display = 'flex';
        }

        // Inizializzazione
        renderAll();

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC PRO V33</title>
    <style>
        :root { --red: #C61C23; --bg: #000; --card: #121212; --gold: #D4AF37; }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; height: 100%; overflow: hidden; }

        /* INTRO */
        #intro { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: 0.5s; }
        .logo-title { font-size: 3.5rem; font-weight: 900; color: var(--red); letter-spacing: -2px; margin-bottom: 30px; }
        .btn-enter { background: var(--red); color: white; border: none; padding: 20px 40px; font-size: 1rem; font-weight: 900; border-radius: 4px; cursor: pointer; text-transform: uppercase; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* UI */
        header { height: 65px; background: #080808; border-bottom: 2px solid var(--red); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        .burger { font-size: 30px; color: var(--red); cursor: pointer; }
        .nav { position: absolute; top: 65px; right: 0; background: #0a0a0a; width: 240px; display: none; flex-direction: column; border-left: 2px solid var(--red); z-index: 9999; }
        .nav button { background: none; border: none; color: white; padding: 18px; text-align: left; border-bottom: 1px solid #1a1a1a; font-weight: 900; text-transform: uppercase; }

        .container { height: calc(100vh - 65px); overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .page { display: none; } .active { display: block; }

        /* CAMPO PERSONALIZZATO */
        #campo-container { 
            width: 100%; height: 500px; background: #1b3d21; border: 2px solid #333; border-radius: 8px; 
            position: relative; overflow: hidden; touch-action: none; background-size: cover; background-position: center;
        }
        .giocatore-tag { position: absolute; background: rgba(0,0,0,0.8); color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 11px; font-weight: 900; border-left: 3px solid var(--red); z-index: 100; white-space: nowrap; box-shadow: 0 4px 8px rgba(0,0,0,0.4); text-transform: uppercase; }

        /* CARDS */
        .card { background: var(--card); border-radius: 8px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--red); }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; text-align: center; }
        .stat-val { display: block; font-size: 18px; font-weight: 900; color: var(--red); }
        .stat-lbl { font-size: 10px; color: #666; text-transform: uppercase; }

        .btn-p { background: var(--red); color: white; border: none; padding: 15px; border-radius: 4px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        input, textarea { width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #333; color: #fff; margin-bottom: 10px; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="intro">
        <h1 class="logo-title">MILANAC</h1>
        <button class="btn-enter" onclick="document.getElementById('intro').style.display='none'; render();">MILANAC la web app dei giocatori</button>
    </div>

    <header>
        <div style="color: var(--red); font-weight: 900; font-size: 22px; letter-spacing: 1px;">MILANAC</div>
        <div class="burger" onclick="toggleNav()">☰</div>
        <div id="nav" class="nav">
            <button onclick="showPage('home')">SQUADRA</button>
            <button onclick="showPage('lavagna')">LAVAGNA</button>
            <button onclick="showPage('news')">NOTIZIE</button>
            <button onclick="showPage('stats')">CLASSIFICHE</button>
            <button onclick="showPage('admin')">ADMIN</button>
        </div>
    </header>

    <div class="container">
        <div id="page-home" class="page active">
            <h1 style="text-align:center;">LA ROSA</h1>
            <div id="lista-giocatori"></div>
        </div>

        <div id="page-lavagna" class="page">
            <h1 style="text-align:center;">LAVAGNA TATTICA</h1>
            <div id="campo-container">
                <div id="players-on-pitch"></div>
            </div>
            <div style="margin-top:15px;">
                <label style="font-size: 12px; color: #666; display: block; margin-bottom: 5px;">CARICA IL TUO CAMPO (Immagine):</label>
                <input type="file" id="campo-upload" accept="image/*" onchange="uploadCampo(this)" style="font-size:12px;">
            </div>
        </div>

        <div id="page-news" class="page">
            <h1 style="text-align:center;">COMUNICATI</h1>
            <div id="lista-news"></div>
        </div>

        <div id="page-admin" class="page">
            <h1 style="text-align:center;">AREA RISERVATA</h1>
            <input type="password" id="adm-pass" placeholder="Password Admin">
            <button class="btn-p" onclick="login()">ACCEDI</button>
            <div id="adm-box" style="display:none; margin-top:20px;">
                <div class="card">
                    <h3>AGGIUNGI GIOCATORE</h3>
                    <input type="text" id="g-nome" placeholder="Nome">
                    <button class="btn-p" onclick="addG()">SALVA</button>
                </div>
                <div class="card">
                    <h3>NUOVA NOTIZIA</h3>
                    <input type="text" id="n-t" placeholder="Titolo">
                    <textarea id="n-c" rows="3" placeholder="Testo..."></textarea>
                    <button class="btn-p" onclick="addN()">PUBBLICA</button>
                </div>
                <div id="adm-list"></div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('milanac_v33') || '{"ps":[], "ns":[], "bg":""}');

        function toggleNav() { const n = document.getElementById('nav'); n.style.display = (n.style.display === 'flex') ? 'none' : 'flex'; }
        function showPage(p) { document.querySelectorAll('.page').forEach(x => x.classList.remove('active')); document.getElementById('page-'+p).classList.add('active'); toggleNav(); render(); }
        function login() { if(document.getElementById('adm-pass').value === 'milan') document.getElementById('adm-box').style.display='block'; }
        function save() { localStorage.setItem('milanac_v33', JSON.stringify(db)); render(); }

        // Caricamento immagine campo
        function uploadCampo(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                db.bg = reader.result;
                save();
            }
            if (file) reader.readAsDataURL(file);
        }

        function addG() { const n = document.getElementById('g-nome').value; if(n){ db.ps.push({id:Date.now(), n, g:0, a:0, p:0, v:[], in:false}); save(); } }
        function addN() { const t = document.getElementById('n-t').value, c = document.getElementById('n-c').value; if(t&&c){ db.ns.unshift({id:Date.now(), t, c, d:new Date().toLocaleDateString()}); save(); } }

        function setVoti(id) {
            let voti = [];
            for(let i=1; i<=5; i++) {
                let v = prompt("Voto Admin " + i + ":");
                if(v) voti.push(parseFloat(v.replace(',','.')));
            }
            if(voti.length > 0) {
                let media = (voti.reduce((a,b)=>a+b,0)/voti.length).toFixed(2);
                db.ps.find(x=>x.id===id).v.push(parseFloat(media));
                save();
            }
        }

        function render() {
            // Applica immagine campo
            if(db.bg) document.getElementById('campo-container').style.backgroundImage = `url(${db.bg})`;

            // Lista Rosa
            document.getElementById('lista-giocatori').innerHTML = db.ps.map(p => {
                const m = p.v.length ? (p.v.reduce((a,b)=>a+b,0)/p.v.length).toFixed(2) : "-";
                return `<div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b style="font-size:1.3rem;">${p.n.toUpperCase()}</b>
                        <span style="color:var(--gold); font-weight:900;">Ø ${m}</span>
                    </div>
                    <div class="stats-grid">
                        <div><span class="stat-val">${p.p}</span><span class="stat-lbl">Presenze</span></div>
                        <div><span class="stat-val">${p.g}</span><span class="stat-lbl">Goal</span></div>
                        <div><span class="stat-val">${p.a}</span><span class="stat-lbl">Assist</span></div>
                    </div>
                    <button class="btn-p" onclick="db.ps.find(x=>x.id===${p.id}).in=!db.ps.find(x=>x.id===${p.id}).in; save();" 
                    style="margin-top:15px; height:40px; font-size:12px; background:${p.in?'var(--red)':'#222'}">${p.in?'CONVOCATO':'NON CONVOCATO'}</button>
                </div>`;
            }).join('');

            // Lavagna
            const c = document.getElementById('players-on-pitch'); c.innerHTML = '';
            db.ps.filter(p => p.in).forEach((p, i) => {
                const d = document.createElement('div'); d.className = 'giocatore-tag'; d.innerText = p.n;
                d.style.left = '20px'; d.style.top = (i * 45 + 50) + 'px'; c.appendChild(d);
                d.addEventListener('touchmove', e => {
                    e.preventDefault(); let t = e.touches[0]; let r = document.getElementById('campo-container').getBoundingClientRect();
                    d.style.left = (t.pageX - r.left - 40) + 'px'; d.style.top = (t.pageY - r.top - 15) + 'px';
                }, {passive: false});
            });

            // Notizie
            document.getElementById('lista-news').innerHTML = db.ns.map(n => `
                <div class="card">
                    <small style="color:var(--gold)">${n.d}</small>
                    <h2 style="margin:5px 0;">${n.t.toUpperCase()}</h2>
                    <p style="color:#aaa; line-height:1.4;">${n.c}</p>
                </div>`).join('');

            // Admin List
            document.getElementById('adm-list').innerHTML = db.ps.map(p => `
                <div class="card">
                    <b>${p.n}</b>
                    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin-top:10px;">
                        <input type="number" onchange="db.ps.find(x=>x.id===${p.id}).p=parseInt(this.value);save()" value="${p.p}" placeholder="P">
                        <input type="number" onchange="db.ps.find(x=>x.id===${p.id}).g=parseInt(this.value);save()" value="${p.g}" placeholder="G">
                        <input type="number" onchange="db.ps.find(x=>x.id===${p.id}).a=parseInt(this.value);save()" value="${p.a}" placeholder="A">
                    </div>
                    <button onclick="setVoti(${p.id})" style="background:var(--gold); color:#000; padding:10px; border:none; width:100%; font-weight:bold;">VOTI 5 ADMIN</button>
                    <button onclick="db.ps=db.ps.filter(x=>x.id!==${p.id});save()" style="color:red; background:none; border:none; width:100%; margin-top:10px; font-size:10px;">ELIMINA</button>
                </div>`).join('');
        }
    </script>
</body>
</html>

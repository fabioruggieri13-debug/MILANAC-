<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC PRO CLUB - ELITE</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { 
            --rosso: #C61C23; 
            --oro: #D4AF37; 
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body { 
            margin: 0; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            touch-action: none;
            /* SFONDO DINAMICO GRADIENT */
            background: linear-gradient(135deg, #000 0%, #1a0000 50%, #000 100%);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        #intro { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at center, #250000 0%, #000 100%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 10000; transition: 0.8s;
        }
        .pulsing-title { font-size: 3.5rem; font-weight: 900; text-transform: uppercase; animation: colorPulse 3s infinite alternate; letter-spacing: 4px; }
        @keyframes colorPulse { 0% { color: var(--oro); text-shadow: 0 0 20px var(--oro); } 100% { color: var(--rosso); text-shadow: 0 0 20px var(--rosso); } }

        header { 
            height: 60px; 
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px; 
            background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border); 
            z-index: 2000; position: relative; 
        }

        .sidebar { 
            position: fixed; top: 0; right: -100%; width: 280px; height: 100%; 
            background: rgba(10,10,10,0.85); backdrop-filter: blur(20px);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 3000; border-left: 1px solid var(--rosso); padding-top: 60px; 
        }
        .sidebar.active { right: 0; }
        .sidebar button { 
            width: 100%; padding: 18px; background: none; border: none; color: white; 
            text-align: left; font-weight: bold; border-bottom: 1px solid var(--glass-border); 
            text-transform: uppercase; cursor: pointer; 
        }

        .container { height: calc(100vh - 60px); overflow-y: auto; padding: 15px; box-sizing: border-box; padding-bottom: 80px; }
        .page { display: none; animation: fadeIn 0.4s ease-out; } 
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* MODULO SELECTOR GLASS */
        .mod-selector-container { 
            margin-bottom: 15px; display: flex; align-items: center; gap: 10px; 
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); 
        }
        .mod-label { font-size: 11px; font-weight: bold; color: var(--oro); text-transform: uppercase; }
        #mod-select { 
            flex-grow: 1; padding: 10px; background: rgba(0,0,0,0.3); 
            border: 1px solid var(--glass-border); color: white; border-radius: 6px; font-weight: bold; 
        }

        /* CAMPO DA GIOCO FIXATO CON SFOCATURA LATERALE */
        #pitch { 
            width: 100% !important; aspect-ratio: 2/3 !important; max-height: 70vh !important; 
            margin: 0 auto !important; background: #2e7d32 !important; border: 2px solid rgba(255,255,255,0.7) !important; 
            position: relative !important; overflow: hidden !important; 
            background-image: repeating-linear-gradient(0deg, #1b5e20, #1b5e20 10%, #2e7d32 10%, #2e7d32 20%) !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
            border-radius: 8px;
        }
        .p-line { position: absolute !important; border: 1.5px solid rgba(255,255,255,0.8) !important; pointer-events: none; }
        .mid-line { top: 50% !important; width: 100% !important; height: 0 !important; border-top: 1.5px solid #fff !important; }
        .mid-circle { top: 50% !important; left: 50% !important; width: 25% !important; aspect-ratio: 1 !important; border: 1.5px solid #fff !important; border-radius: 50% !important; transform: translate(-50%, -50%) !important; }
        
        .player { position: absolute; width: 54px; text-align: center; cursor: move; z-index: 100; touch-action: none; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.4)); }
        .jersey { 
            width: 42px; height: 42px; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            border: 2px solid var(--oro); border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; margin: 0 auto; color: #fff; font-size: 16px; position: relative; 
            box-shadow: inset 0 0 10px var(--rosso);
        }
        .badge-icon { position: absolute; top: -8px; right: -8px; font-size: 16px; background: rgba(0,0,0,0.8); border-radius: 50%; padding: 2px; }
        .p-name { 
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); font-size: 10px; padding: 2px 8px; 
            border-radius: 4px; margin-top: 4px; display: inline-block; font-weight: bold; 
            text-transform: uppercase; color: white; border: 1px solid var(--glass-border);
        }

        /* CARD GLASSMORPHISM */
        .card { 
            background: var(--glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 16px; margin-bottom: 14px; border: 1px solid var(--glass-border);
            border-radius: 12px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-main { 
            width: 100%; padding: 14px; background: linear-gradient(45deg, var(--rosso), #800000); 
            color: white; border: none; font-weight: bold; border-radius: 8px; 
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(198, 28, 35, 0.2);
        }
        .btn-main:active { transform: scale(0.96); }

        input, select, textarea { 
            width: 100%; padding: 12px; margin: 6px 0; background: rgba(255,255,255,0.05); 
            border: 1px solid var(--glass-border); color: white; border-radius: 8px; box-sizing: border-box; 
        }
        
        .vote-control { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; margin-top: 8px; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 8px; font-size: 13px; }
        .v-val { font-size: 1.4rem; font-weight: 900; color: var(--oro); min-width: 40px; text-align: center; text-shadow: 0 0 10px rgba(212,175,55,0.4); }
        
        .btn-v { width: 34px; height: 34px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-v:active { transform: translateY(2px); }

        #modal-player { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 5000; display: none; padding: 20px; align-items: center; justify-content: center; }
        .modal-content { 
            background: rgba(20,20,20,0.9); border: 1px solid var(--oro); border-radius: 20px; 
            padding: 30px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 0 30px rgba(212,175,55,0.2);
        }
    </style>
</head>
<body>

    <div id="intro">
        <h1 class="pulsing-title">MILANAC</h1>
        <p style="letter-spacing: 3px; font-size: 12px; opacity: 0.8;">PRO CLUB ELITE EDITION</p>
        <button class="btn-main" style="width:200px; margin-top:30px; border-radius:30px;" onclick="document.getElementById('intro').style.opacity='0'; setTimeout(()=>document.getElementById('intro').style.display='none', 800)">ENTRA NELL'ARENA</button>
    </div>

    <header>
        <div style="font-weight:900; color:var(--oro); font-size:22px; letter-spacing:1px;">MILANAC</div>
        <div onclick="document.querySelector('.sidebar').classList.add('active')" style="font-size:28px; cursor:pointer; color:white">☰</div>
    </header>

    <nav class="sidebar">
        <button onclick="go('rosa')">🛡️ LA ROSA</button>
        <button onclick="go('tattica')">📋 TATTICA</button>
        <button onclick="go('calendario')">📅 CALENDARIO</button>
        <button onclick="go('news')">📰 NEWS</button>
        <button onclick="go('mercato')">💰 MERCATO</button>
        <button onclick="go('partite')">🏟️ RISULTATI</button>
        <button onclick="go('premi')">🏆 PREMI</button>
        <button onclick="goAdmin()" style="color:var(--oro)">⚙️ ADMIN</button>
        <button onclick="document.querySelector('.sidebar').classList.remove('active')" style="background:rgba(255,0,0,0.1); text-align:center; margin-top:20px;">CHIUDI</button>
    </nav>

    <div class="container">
        <div id="p-news" class="page">
            <h3 style="color:var(--oro)">NEWS & COMUNICATI</h3>
            <div class="card">
                <textarea id="news-text" placeholder="Scrivi un annuncio per la squadra..."></textarea>
                <button class="btn-main" style="margin-top:10px" onclick="addNews()">PUBBLICA</button>
            </div>
            <div id="l-news"></div>
        </div>

        <div id="p-rosa" class="page active"><div id="l-rosa"></div></div>
        
        <div id="p-tattica" class="page">
            <div class="mod-selector-container">
                <span class="mod-label">Modulo:</span>
                <select id="mod-select" onchange="setModulo(this.value)"></select>
            </div>
            <div id="pitch">
                <div class="p-line mid-line"></div>
                <div class="p-line mid-circle"></div>
                <div class="p-line box-large-top" style="top:-2px; left:50%; width:66%; height:18%; transform:translateX(-50%); border-top:none;"></div>
                <div class="p-line box-small-top" style="top:-2px; left:50%; width:32%; height:6%; transform:translateX(-50%); border-top:none;"></div>
                <div class="p-line box-large-bot" style="bottom:-2px; left:50%; width:66%; height:18%; transform:translateX(-50%); border-bottom:none;"></div>
                <div class="p-line box-small-bot" style="bottom:-2px; left:50%; width:32%; height:6%; transform:translateX(-50%); border-bottom:none;"></div>
                <div id="pitch-players"></div>
            </div>
        </div>

        <div id="p-calendario" class="page">
            <h3 style="color:var(--oro)">CALENDARIO PARTITE</h3>
            <div class="card">
                <input type="text" id="cal-avv" placeholder="Squadra Avversaria">
                <input type="datetime-local" id="cal-data">
                <button class="btn-main" onclick="addCalendarEvent()">SALVA EVENTO</button>
            </div>
            <div id="l-calendario"></div>
        </div>

        <div id="p-mercato" class="page"><h3 style="color:var(--oro)">VALORI DI MERCATO</h3><div id="l-mercato"></div></div>

        <div id="p-partite" class="page">
            <h3 style="color:var(--oro)">RISULTATI STORICI</h3>
            <div class="card">
                <input type="text" id="m-avv" placeholder="Avversario">
                <input type="text" id="m-ris" placeholder="Risultato (es. 3-1)">
                <button class="btn-main" onclick="addMatch()">AGGIUNGI</button>
            </div>
            <div id="l-partite"></div>
        </div>

        <div id="p-premi" class="page"><h3 style="color:var(--oro)">HALL OF FAME</h3><div id="l-premi"></div></div>
        
        <div id="p-admin" class="page">
            <div class="card">
                <h3 style="margin-top:0">PANNELLO ADMIN</h3>
                <label style="font-size:12px; color:var(--oro)">Seleziona la tua identità:</label>
                <select id="active-admin" onchange="render()">
                    <option value="Fabio">Fabio</option><option value="Beppe">Beppe</option>
                    <option value="Christian">Christian</option><option value="Vicio">Vicio</option>
                    <option value="Martin">Martin</option>
                </select>
                <hr style="border:0; border-top:1px solid var(--glass-border); margin:15px 0;">
                <h4 style="margin:0 0 10px 0">NUOVO PLAYER</h4>
                <input type="text" id="in-n" placeholder="Nome">
                <input type="number" id="in-m" placeholder="Numero">
                <select id="in-r"><option>POR</option><option>DIF</option><option>CEN</option><option>ATT</option></select>
                <button class="btn-main" onclick="addP()">AGGIUNGI A ROSA</button>
            </div>
            <div id="l-admin"></div>
        </div>
    </div>

    <div id="modal-player" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="m-nome" style="color:var(--oro); margin-top:0;"></h2>
            <div id="m-stats" style="line-height:1.8; font-weight:bold;"></div>
            <button class="btn-main" style="margin-top:20px; width:120px;" onclick="document.getElementById('modal-player').style.display='none'">CHIUDI</button>
        </div>
    </div>

    <script>
        // CONFIGURAZIONE FIREBASE
        const firebaseConfig = { apiKey: "AIzaSyDbO_AxHKz1avQpYscoSSLpEfmFaL8MRGg", authDomain: "milanac-proclub.firebaseapp.com", projectId: "milanac-proclub", storageBucket: "milanac-proclub.firebasestorage.app", messagingSenderId: "61702234008", appId: "1:61702234008:web:aa597d8600d0a8251895ed" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        let data = { ps: [], mod: '4-4-2', matches: [], news: [], calendar: [] };
        
        const PASS = "milanac"; 

        const modali = {
            '4-4-2': [{x:43,y:82},{x:10,y:68},{x:33,y:70},{x:55,y:70},{x:78,y:68},{x:10,y:42},{x:33,y:45},{x:55,y:45},{x:78,y:42},{x:33,y:18},{x:55,y:18}],
            '4-3-3': [{x:43,y:82},{x:10,y:68},{x:33,y:70},{x:55,y:70},{x:78,y:68},{x:25,y:45},{x:43,y:50},{x:62,y:45},{x:15,y:20},{x:43,y:14},{x:72,y:20}],
            '3-5-2': [{x:43,y:82},{x:25,y:70},{x:43,y:70},{x:62,y:70},{x:5,y:42},{x:28,y:45},{x:43,y:45},{x:58,y:45},{x:82,y:42},{x:33,y:18},{x:55,y:18}],
            '3-4-1-2': [{x:43,y:82},{x:25,y:70},{x:43,y:70},{x:62,y:70},{x:10,y:45},{x:33,y:48},{x:55,y:48},{x:78,y:45},{x:43,y:28},{x:33,y:14},{x:55,y:14}],
            '4-2-3-1': [{x:43,y:82},{x:10,y:68},{x:33,y:70},{x:55,y:70},{x:78,y:68},{x:33,y:50},{x:55,y:50},{x:15,y:28},{x:43,y:30},{x:72,y:28},{x:43,y:14}],
            '4-3-1-2': [{x:43,y:82},{x:10,y:68},{x:33,y:70},{x:55,y:70},{x:78,y:68},{x:20,y:45},{x:43,y:48},{x:65,y:45},{x:43,y:30},{x:33,y:14},{x:55,y:14}],
            '5-3-2': [{x:43,y:82},{x:10,y:68},{x:28,y:70},{x:43,y:72},{x:58,y:70},{x:78,y:68},{x:25,y:45},{x:43,y:48},{x:62,y:45},{x:33,y:18},{x:55,y:18}],
            '3-4-3': [{x:43,y:82},{x:25,y:70},{x:43,y:70},{x:62,y:70},{x:10,y:45},{x:33,y:42},{x:55,y:42},{x:78,y:45},{x:15,y:18},{x:43,y:13},{x:72,y:18}]
        };

        db.collection("milanac").doc("v84_final").onSnapshot(doc => { if(doc.exists) { data = doc.data(); render(); } });
        function sync() { db.collection("milanac").doc("v84_final").set(data); }

        function go(p) { 
            document.querySelectorAll('.page').forEach(x=>x.classList.remove('active')); 
            document.getElementById('p-'+p).classList.add('active'); 
            document.querySelector('.sidebar').classList.remove('active'); 
        }
        
        function goAdmin() {
            let p = prompt("ACCESSO ADMIN:");
            if(p === PASS) { go('admin'); } else { alert("NEGATO!"); }
        }

        function addP() {
            const n=document.getElementById('in-n').value, m=document.getElementById('in-m').value, r=document.getElementById('in-r').value;
            if(n&&m){ 
                data.ps.push({id:Date.now(), n, m, r, g:0, a:0, mvp:0, yl:0, rd:0, potm:0, convocato:false, x:43, y:80, v_adm:{"Fabio":6,"Beppe":6,"Christian":6,"Vicio":6,"Martin":6} }); 
                sync(); 
                document.getElementById('in-n').value=''; document.getElementById('in-m').value='';
            }
        }

        function updateStat(id, key, val) {
            const i = data.ps.findIndex(x => x.id == id);
            data.ps[i][key] = Math.max(0, (data.ps[i][key] || 0) + val);
            sync();
        }

        function setModulo(m) {
            data.mod = m;
            const conv = data.ps.filter(p => p.convocato);
            conv.forEach((p, i) => { if(modali[m][i]) { p.x = modali[m][i].x; p.y = modali[m][i].y; } });
            sync();
        }

        function addMatch() {
            const avv=document.getElementById('m-avv').value, ris=document.getElementById('m-ris').value;
            if(avv&&ris){ if(!data.matches) data.matches=[]; data.matches.unshift({avv, ris, d: new Date().toLocaleDateString()}); sync(); }
        }

        function addCalendarEvent() {
            const avv = document.getElementById('cal-avv').value, dt = document.getElementById('cal-data').value;
            if(avv && dt) {
                if(!data.calendar) data.calendar = [];
                data.calendar.push({avv, dt}); sync();
            }
        }

        function addNews() {
            const txt = document.getElementById('news-text').value;
            if(txt){ if(!data.news) data.news=[]; data.news.unshift({txt, d: new Date().toLocaleString()}); sync(); document.getElementById('news-text').value=''; }
        }

        function render() {
            let hR="", hA="", hMk="", hP="", hMatch="", hNews="", hCal="";
            const activeAdm = document.getElementById('active-admin').value;

            // Premi Automatici
            let maxMedia = -1, topPlayerId = null, maxMvp = -1, kingId = null, maxDefMedia = -1, wallId = null;
            data.ps.forEach(p => {
                const voti = Object.values(p.v_adm || {});
                const media = parseFloat((voti.reduce((a,b)=>a+b,0) / voti.length).toFixed(1));
                if(media > maxMedia) { maxMedia = media; topPlayerId = p.id; }
                if((p.mvp || 0) > maxMvp) { maxMvp = p.mvp; kingId = p.id; }
                if(p.r === 'DIF' && media > maxDefMedia) { maxDefMedia = media; wallId = p.id; }
            });

            // Sync Selettore Modulo
            const modSelect = document.getElementById('mod-select');
            if (modSelect.options.length === 0) {
                Object.keys(modali).forEach(m => {
                    let opt = document.createElement('option'); opt.value = m; opt.innerHTML = m; modSelect.appendChild(opt);
                });
            }
            modSelect.value = data.mod;

            data.ps.forEach(p => {
                const voti = Object.values(p.v_adm || {});
                const media = (voti.reduce((a,b)=>a+b,0) / voti.length).toFixed(1);
                let bRosa = (p.id === kingId && maxMvp > 0) ? "👑" : (p.id === topPlayerId && maxMedia > 6) ? "🔥" : (p.id === wallId && maxDefMedia > 6) ? "🧱" : "";

                hR += `<div class="card" onclick="openP(${p.id})">
                    <span style="float:right; font-size:1.2rem">${bRosa}</span>
                    <b style="font-size:1.1rem">${p.n}</b> <span style="opacity:0.6">#${p.m}</span><br>
                    <small style="color:var(--oro)">${p.r} | MEDIA: ${media}</small><br>
                    <button class="btn-main" style="width:auto; padding:6px 15px; margin-top:10px; background:${p.convocato?'#2e7d32':'rgba(255,255,255,0.1)'}" onclick="event.stopPropagation(); const i=data.ps.findIndex(x=>x.id==${p.id}); data.ps[i].convocato=!data.ps[i].convocato; sync()">${p.convocato?'TITOLARE':'RISERVA'}</button>
                </div>`;

                hMk += `<div class="card"><b>${p.n}</b> <span style="float:right; color:var(--oro)">€${(10+(media-6)*5+(p.g||0)*2).toFixed(1)}M</span></div>`;
                hP += `<div class="card"><b>${p.n}</b> <span style="float:right">👑 ${p.mvp||0} | ⭐ ${p.potm||0}</span></div>`;
                
                hA += `<div class="card">
                    <b>${p.n}</b> <button style="color:red; float:right; border:none; background:none;" onclick="if(confirm('Eliminare?')){data.ps=data.ps.filter(x=>x.id!==${p.id}); sync()}">🗑️</button>
                    <div class="vote-control">
                        <button class="btn-v" style="background:#c61c23" onclick="const i=data.ps.findIndex(x=>x.id==${p.id}); data.ps[i].v_adm['${activeAdm}']=Math.max(0,data.ps[i].v_adm['${activeAdm}']-0.5); sync()">-</button>
                        <span class="v-val">${p.v_adm[activeAdm]}</span>
                        <button class="btn-v" style="background:#2e7d32" onclick="const i=data.ps.findIndex(x=>x.id==${p.id}); data.ps[i].v_adm['${activeAdm}']+=0.5; sync()">+</button>
                    </div>
                    <div class="stat-row">
                        <span>⚽ G: ${p.g||0} | 👟 A: ${p.a||0}</span> 
                        <div>
                            <button class="btn-v" style="background:var(--oro); color:black; margin-right:5px" onclick="updateStat(${p.id},'g',1)">G+</button>
                            <button class="btn-v" style="background:white; color:black" onclick="updateStat(${p.id},'a',1)">A+</button>
                        </div>
                    </div>
                </div>`;
            });

            (data.matches || []).forEach(m => { hMatch += `<div class="card"><b>${m.d}</b>: ${m.ris} vs ${m.avv}</div>`; });
            (data.news || []).forEach(n => { hNews += `<div class="card"><small>${n.d}</small><p style="margin:5px 0">${n.txt}</p></div>`; });
            (data.calendar || []).forEach(c => { hCal += `<div class="card">📅 ${new Date(c.dt).toLocaleString()}<br><b>vs ${c.avv}</b></div>`; });

            document.getElementById('l-rosa').innerHTML = hR; document.getElementById('l-admin').innerHTML = hA;
            document.getElementById('l-mercato').innerHTML = hMk; document.getElementById('l-partite').innerHTML = hMatch;
            document.getElementById('l-news').innerHTML = hNews; document.getElementById('l-premi').innerHTML = hP;
            document.getElementById('l-calendario').innerHTML = hCal;

            const pl = document.getElementById('pitch-players'); pl.innerHTML = "";
            data.ps.filter(p => p.convocato).forEach(p => {
                const d = document.createElement('div'); d.className = 'player'; d.style.left = p.x + "%"; d.style.top = p.y + "%";
                d.innerHTML = `<div class="jersey">${p.m}</div><div class="p-name">${p.n}</div>`;
                d.onclick = () => openP(p.id);
                let isD = false;
                const start = () => isD = true;
                const move = (e) => {
                    if (!isD) return;
                    const rect = document.getElementById('pitch').getBoundingClientRect();
                    const t = e.touches ? e.touches[0] : e;
                    p.x = ((t.clientX - rect.left) / rect.width) * 100 - 7;
                    p.y = ((t.clientY - rect.top) / rect.height) * 100 - 5;
                    d.style.left = p.x + "%"; d.style.top = p.y + "%";
                };
                const end = () => { if(isD) { isD = false; sync(); } };
                d.addEventListener('touchstart', start); window.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', end);
                pl.appendChild(d);
            });
        }

        function openP(id) {
            const p = data.ps.find(x=>x.id==id); document.getElementById('m-nome').innerText = p.n;
            document.getElementById('m-stats').innerHTML = `⚽ GOAL: ${p.g||0} <br> 👟 ASSIST: ${p.a||0} <br> 👑 MVP: ${p.mvp||0} <br> ⭐ POTM: ${p.potm||0}`;
            document.getElementById('modal-player').style.display='flex';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC ULTIMATE</title>
    <link rel="icon" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        :root { --red: #ff0000; --bg: #000; --card: #121212; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'DIN Condensed', 'Segoe UI', sans-serif; height: 100vh; width: 100vw; overflow: hidden; }

        /* SPLASH SCREEN */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .logo-anim { font-size: 3.5rem; font-weight: 900; color: var(--red); text-shadow: 0 0 30px var(--red); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* STRUTTURA */
        #app-content { display: none; height: 100vh; flex-direction: column; }
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 30px; }
        .page { display: none; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* NAVBAR IN BASSO */
        .nav { display: flex; background: #080808; border-top: 2px solid var(--red); height: 75px; flex-shrink: 0; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #444; font-weight: bold; }
        .nav-btn.active { color: #fff; background: #111; box-shadow: inset 0 3px 0 var(--red); }
        .nav-icon { font-size: 20px; margin-bottom: 3px; }

        /* CARD FC26 ROSSONERA */
        .fc-card {
            width: 260px; height: 380px; margin: 10px auto; background: linear-gradient(135deg, #000 0%, #ff0000 50%, #000 100%);
            clip-path: polygon(10% 0, 90% 0, 100% 15%, 100% 85%, 50% 100%, 0 85%, 0 15%);
            position: relative; padding: 2px; box-shadow: 0 0 20px rgba(255,0,0,0.3);
        }
        .fc-inner { background: #000; height: 100%; width: 100%; clip-path: inherit; position: relative; text-align: center; }
        .ovr { position: absolute; top: 35px; left: 25px; font-size: 50px; font-weight: 900; color: var(--red); }
        .pos { position: absolute; top: 85px; left: 28px; font-size: 16px; font-weight: bold; }
        .p-name { margin-top: 180px; font-size: 24px; font-weight: 900; text-transform: uppercase; border-bottom: 2px solid var(--red); width: 80%; margin-left: 10%; }
        .fc-stats { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }

        /* CAMPO */
        #pitch { width: 100%; height: 380px; background: #1e4d2b; border: 2px solid white; position: relative; border-radius: 10px; overflow: hidden; touch-action: none; }
        .player-dot { width: 38px; height: 38px; background: red; color: white; border-radius: 50%; position: absolute; display: flex; align-items: center; justify-content: center; font-size: 9px; border: 2px solid white; font-weight: bold; z-index: 10; }

        /* UI GENERALE */
        .card-ui { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #222; }
        h1 { color: var(--red); text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-top: 0; }
        button { background: var(--red); color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; text-transform: uppercase; cursor: pointer; }
        input, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-anim">MILANAC</div>
        <div style="color: #444; margin-top: 10px; letter-spacing: 2px;">RED & BLACK SPIRIT</div>
    </div>

    <div id="app-content">
        <div class="content">
            <div id="pg-h" class="page active">
                <h1>LINEUP</h1>
                <div id="list-h"></div>
            </div>

            <div id="pg-t" class="page">
                <h1>PITCH</h1>
                <div id="pitch"><div id="pitch-pl"></div></div>
                <button onclick="render()" style="background:#222; margin-top:10px;">RESET CAMPO</button>
            </div>

            <div id="pg-p" class="page">
                <h1>MY CARD</h1>
                <div class="fc-card">
                    <div class="fc-inner">
                        <div class="ovr" id="c-ovr">--</div>
                        <div class="pos" id="c-pos">---</div>
                        <div class="p-name" id="c-name">PLAYER</div>
                        <div class="fc-stats">
                            <div><div id="c-gol" style="font-size:20px; font-weight:900; color:red;">0</div><div style="font-size:10px;">GOL</div></div>
                            <div><div id="c-match" style="font-size:20px; font-weight:900; color:red;">0</div><div style="font-size:10px;">GARA</div></div>
                            <div><div id="c-mvp" style="font-size:20px; font-weight:900; color:red;">0</div><div style="font-size:10px;">MVP</div></div>
                        </div>
                    </div>
                </div>
                <button onclick="setUser()">IDENTIFICATI</button>
            </div>

            <div id="pg-s" class="page">
                <h1>CLUB STATS</h1>
                <div class="card-ui"><h3>POTM</h3><h2 id="club-potm" style="color:gold; text-align:center;">---</h2></div>
                <div class="card-ui"><h3>GOALS</h3><h1 id="club-gol" style="text-align:center;">0</h1></div>
            </div>

            <div id="pg-a" class="page">
                <h1>ADMIN</h1>
                <div id="adm-login"><input type="password" id="pw" placeholder="Password"><button onclick="auth()">ENTRA</button></div>
                <div id="adm-ui" style="display:none">
                    <div class="card-ui">
                        <input type="text" id="add-n" placeholder="Nome">
                        <select id="add-r"><option>ATT</option><option>CC</option><option>DIF</option><option>POR</option></select>
                        <button onclick="add()">AGGIUNGI PLAYER</button>
                    </div>
                    <div class="card-ui">
                        <input type="text" id="set-potm" placeholder="Nome POTM">
                        <input type="number" id="set-gol" placeholder="Gol Totali">
                        <button onclick="upGlobal()">AGGIORNA CLUB</button>
                    </div>
                    <div id="list-adm"></div>
                </div>
            </div>
        </div>

        <div class="nav">
            <div class="nav-btn active" onclick="tab('h', this)"><span class="nav-icon">📋</span>LISTA</div>
            <div class="nav-btn" onclick="tab('t', this)"><span class="nav-icon">🏟️</span>CAMPO</div>
            <div class="nav-btn" onclick="tab('p', this)"><span class="nav-icon">👤</span>PROFILE</div>
            <div class="nav-btn" onclick="tab('s', this)"><span class="nav-icon">🏆</span>STATS</div>
            <div class="nav-btn" onclick="tab('a', this)"><span class="nav-icon

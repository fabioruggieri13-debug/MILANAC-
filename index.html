<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC V35</title>
    <style>
        :root { --red: #C61C23; --bg: #000; --card: #1a1a1a; --gold: #D4AF37; }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* INTRO */
        #intro { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .logo-title { font-size: 3.5rem; font-weight: 900; color: var(--red); letter-spacing: -2px; margin-bottom: 30px; }
        .btn-pulse { background: var(--red); color: white; border: none; padding: 20px 40px; font-size: 1rem; font-weight: 900; border-radius: 4px; cursor: pointer; text-transform: uppercase; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(198, 28, 35, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(198, 28, 35, 0); } 100% { box-shadow: 0 0 0 0 rgba(198, 28, 35, 0); } }

        /* UI */
        header { height: 60px; background: #0a0a0a; border-bottom: 2px solid var(--red); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .burger { font-size: 28px; color: var(--red); cursor: pointer; }
        .menu { position: absolute; top: 60px; right: 0; background: #080808; width: 220px; display: none; flex-direction: column; border: 1px solid var(--red); z-index: 999; }
        .menu button { background: none; border: none; color: white; padding: 18px; text-align: left; border-bottom: 1px solid #1a1a1a; font-weight: bold; text-transform: uppercase; font-size: 13px; }

        .content { height: calc(100vh - 60px); overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .page { display: none; } .active { display: block; }

        /* IL CAMPO VERO CON PORTE */
        #pitch-container { 
            width: 100%; height: 500px; background-color: #1a431e; 
            border: 2px solid #fff; border-radius: 8px; position: relative; overflow: hidden; touch-action: none; 
            background-image: url('https://i.imgur.com/8N4R76R.png'); /* Campo con linee e porte */
            background-size: cover; background-position: center;
        }

        /* Pedina Giocatore Tattica */
        .player-token { 
            position: absolute; text-align: center; z-index: 100; cursor: grab; width: 60px;
        }
        .player-shirt {
            width: 40px; height: 40px; background: #000; border: 2px solid var(--red); 
            border-radius: 50%; color: #fff; font-weight: 900; font-size: 18px; 
            display: flex; align-items: center; justify-content: center; margin: 0 auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .player-name-tag {
            background: rgba(0,0,0,0.8); color: #fff; padding: 2px 6px; 
            font-size: 10px; font-weight: bold; border-radius: 2px; margin-top: 4px;
            white-space: nowrap; text-transform: uppercase; border: 1px solid #333;
        }

        /* UI CARDS */
        .card { background: var(--card); border: 1px solid #222; border-radius: 4px; padding: 15px; margin-bottom: 12px; border-left: 3px solid var(--red); }
        .btn-main { background: var(--red); color: white; border: none; padding: 16px; border-radius: 4px; width: 100%; font-weight: 900; text-transform: uppercase; font-size: 14px; cursor: pointer; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; margin-bottom: 10px; border-radius: 4px; }
        .voto { color: var(--gold); font-weight: 900; font-size: 14px; }
    </style>
</head>
<body>

    <div id="intro">
        <div class="logo-title">MILANAC</div>
        <button class="btn-pulse" onclick="startApp()">MILANAC la web app dei giocatori</button>
    </div>

    <header>
        <div style="color: var(--red); font-weight: 900; font-size: 1.2rem; letter-spacing: 2px;">MILANAC</div>
        <div class="burger" onclick="toggleM()">☰</div>
        <div id="menu" class="menu">
            <button onclick="vai('h')">SQUADRA</button>
            <button onclick="vai('t')">LAVAGNA TATTICA</button>
            <button onclick="vai('a')">ADMIN</button>
        </div>
    </header>

    <div class="content">
        <div id="p-h" class="page active">
            <h1>LA ROSA</h1>
            <div id="list-h"></div>
        </div>

        <div id="p-t" class="page">
            <h1>SCHIERAMENTO</h1>
            <div id="pitch-container">
                <div id="players-on-pitch"></div>
            </div>
            <p style="text-align:center; color:#555; font-size:11px; margin-top:10px;">Trascina i cerchi per muovere i giocatori</p>
        </div>

        <div id="p-a" class="page">
            <h1>ADMIN</h1>
            <input type="password" id="pass" placeholder="Password (milan)">
            <button class="btn-main" onclick="auth()">ACCEDI</button>
            <div id="adm-ui" style="display:none; margin-top:20px;">
                <div class="card">
                    <h3>NUOVO GIOCATORE</h3>
                    <input type="text" id="pn" placeholder="Nome">
                    <input type="number" id="pnum" placeholder="Numero di Maglia">
                    <button class="btn-main" onclick="addG()">REGISTRA</button>
                </div>
                <div id="list-adm-g"></div>
            </div>
        </div>
    </div>

    <script>
        // Database persistente V35
        let db = JSON.parse(localStorage.getItem('milanac_v35') || '{"ps":[]}');

        function startApp() { document.getElementById('intro').style.display = 'none'; render(); }
        function toggleM() { const m = document.getElementById('menu'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function vai(p) { document.querySelectorAll('.page').forEach(x => x.classList.remove('active')); document.getElementById('p-'+p).classList.add('active'); toggleM(); render(); }
        function auth() { if(document.getElementById('pass').value === 'milan') document.getElementById('adm-ui').style.display='block'; }

        function addG() { 
            const n = document.getElementById('pn').value; 
            const num = document.getElementById('pnum').value; 
            if(n && num) { db.ps.push({id: Date.now(), n, num, g:0, a:0, m:0, mvp:0, v:[], in: false}); document.getElementById('pn').value=''; document.getElementById('pnum').value=''; save(); } 
        }
        
        function save() { localStorage.setItem('milanac_v35', JSON.stringify(db)); render(); }

        function render() {
            // Squadra
            document.getElementById('list-h').innerHTML = db.ps.map(p => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <b>#${p.num} ${p.n.toUpperCase()}</b>
                        <span class="voto">MVP: ${p.mvp}</span>
                    </div>
                    <div style="margin-top:10px; font-size:12px; color:#666;">GOL: ${p.g} | ASSIST: ${p.a}</div>
                    <button class="btn-main" onclick="db.ps.find(x=>x.id===${p.id}).in=!db.ps.find(x=>x.id===${p.id}).in; save();" 
                    style="margin-top:15px; background:${p.in?'var(--red)':'#1a1a1a'}; height:40px;">${p.in?'CONVOCATO':'ASSENTE'}</button>
                </div>`).join('');

            // Pitch Tattico
            const pitch = document.getElementById('players-on-pitch'); pitch.innerHTML = '';
            db.ps.filter(p => p.in).forEach((p, i) => {
                const token = document.createElement('div');
                token.className = 'player-token';
                token.innerHTML = `
                    <div class="player-shirt">${p.num}</div>
                    <div class="player-name-tag">${p.n.toUpperCase()}</div>
                `;
                token.style.left = '20px'; token.style.top = (i * 60 + 40) + 'px'; 
                pitch.appendChild(token);
                
                // Dragging Mobile
                token.addEventListener('touchmove', e => {
                    e.preventDefault(); let t = e.touches[0]; let r = document.getElementById('pitch-container').getBoundingClientRect();
                    token.style.left = (t.pageX - r.left - 30) + 'px'; token.style.top = (t.pageY - r.top - 30) + 'px';
                }, {passive: false});
            });

            // Admin Rosa
            document.getElementById('list-adm-g').innerHTML = db.ps.map(p => `
                <div class="card">
                    <b>#${p.num} ${p.n}</b>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:10px;">
                        <input type="number" onchange="db.ps.find(x=>x.id===${p.id}).num=this.value;save()" value="${p.num}" placeholder="N°">
                        <input type="number" onchange="db.ps.find(x=>x.id===${p.id}).g=parseInt(this.value);save()" value="${p.g}" placeholder="G">
                    </div>
                    <button onclick="db.ps=db.ps.filter(x=>x.id!==${p.id});save()" style="color:red; background:none; border:none; margin-top:10px; width:100%; font-size:11px;">ELIMINA GIOCATORE</button>
                </div>`).join('');
        }
    </script>
</body>
</html>

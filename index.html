<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC PRO</title>
        <link rel="apple-touch-icon" href="https://via.placeholder.com/192/ff0000/ffffff?text=M">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MILANAC">
    <style>
        :root { --neon: #ff0000; --bg: #000; --card: #151515; }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; width: 100vw; overflow: hidden; }

        /* SPLASH SCREEN - FIX: Aggiunta opacità iniziale 1 */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            opacity: 1; transition: opacity 0.5s ease;
        }
        .logo-milanac {
            font-size: 3.5rem; font-weight: 900; color: var(--neon);
            text-shadow: 0 0 20px var(--neon); letter-spacing: 5px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* APP CONTENT */
        #app-content { display: none; height: 100vh; flex-direction: column; background: var(--bg); }
        .nav { display: flex; background: #1a1a1a; border-bottom: 2px solid var(--neon); height: 60px; flex-shrink: 0; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: #666; text-transform: uppercase; }
        .nav-item.active { color: #fff; background: #222; box-shadow: inset 0 -3px 0 var(--neon); }

        .main { flex: 1; overflow-y: auto; padding: 15px; box-sizing: border-box; padding-bottom: 30px; }
        .page { display: none; }
        .page.active { display: block; }

        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #252525; }
        h1 { color: var(--neon); text-align: center; margin: 10px 0; font-size: 1.5rem; }
        
        /* CAMPO TATTICO */
        #pitch { width: 100%; height: 420px; background: #1e4d2b; border: 2px solid white; position: relative; border-radius: 10px; overflow: hidden; touch-action: none; margin: 0 auto; }
        .linea { position: absolute; background: rgba(255,255,255,0.4); }
        .player { width: 44px; height: 44px; background: red; color: white; border-radius: 50%; position: absolute; display: flex; align-items: center; justify-content: center; font-size: 10px; border: 2px solid white; font-weight: bold; z-index: 100; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }

        input, select, button { width: 100%; padding: 14px; margin: 5px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; font-size: 16px; box-sizing: border-box; }
        button { background: var(--neon); border: none; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-milanac">MILANAC</div>
        <div style="color: #444; margin-top: 20px; font-weight: bold; letter-spacing: 3px;">ENTERING...</div>
    </div>

    <div id="app-content">
        <div class="nav">
            <div class="nav-item active" onclick="tab('h', this)">APPELLO</div>
            <div class="nav-item" onclick="tab('t', this)">CAMPO</div>
            <div class="nav-item" onclick="tab('s', this)">STATS</div>
            <div class="nav-item" onclick="tab('a', this)">ADMIN</div>
        </div>

        <div class="main">
            <div id="p-h" class="page active">
                <h1>CONVOCATI</h1>
                <div id="list-h"></div>
            </div>

            <div id="p-t" class="page">
                <div id="pitch">
                    <div class="linea" style="top:50%; width:100%; height:2px;"></div>
                    <div class="linea" style="top:50%; left:50%; width:80px; height:80px; border:2px solid rgba(255,255,255,0.4); border-radius:50%; transform:translate(-50%,-50%); background:none;"></div>
                    <div id="players-pitch"></div>
                </div>
                <button onclick="render()" style="background:#333; margin-top:10px;">RESET POSIZIONI</button>
            </div>

            <div id="p-s" class="page">
                <h1>STATISTICHE</h1>
                <div class="card"><h3>MVP DEL MESE</h3><h2 id="v-potm" style="text-align:center; color:gold;">---</h2></div>
                <div class="card"><h3>GOL TOTALI CLUB</h3><h1 id="v-gol" style="text-align:center; font-size:3rem;">0</h1></div>
                <div class="card" id="list-albo"><h3>ALBO D'ORO</h3><p>Nessun record per ora.</p></div>
            </div>

            <div id="p-a" class="page">
                <h1>AREA ADMIN</h1>
                <div id="login-form">
                    <input type="password" id="pass" placeholder="Password">
                    <button onclick="login()">ENTRA</button>
                </div>
                <div id="admin-ui" style="display:none">
                    <div class="card">
                        <h3>NUOVO GIOCATORE</h3>
                        <input type="text" id="add-n" placeholder="Nome">
                        <button onclick="add()">AGGIUNGI ORA</button>
                    </div>
                    <div class="card">
                        <h3>STATS & MVP</h3>
                        <input type="text" id="set-p" placeholder="Nome MVP">
                        <input type="number" id="set-g" placeholder="Gol Totali">
                        <button onclick="upStats()">SALVA DATI</button>
                    </div>
                    <div id="list-a"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // FORZA L'APERTURA DOPO 2.5 SECONDI
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                const app = document.getElementById('app-content');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    app.style.display = 'flex';
                    render();
                }, 500);
            }, 2500);
        });

        let club = JSON.parse(localStorage.getItem('milanac_final_v11') || '{"p":[], "potm":"---", "gol":0}');

        function tab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-'+id).classList.add('active');
            el.classList.add('active');
            render();
        }

        function login() { if(document.getElementById('pass').value === "milan") document.getElementById('admin-ui').style.display='block'; }

        function add() {
            const n = document.getElementById('add-n').value;
            if(n) club.p.push({id: Date.now(), n: n, in: false});
            save();
        }

        function upStats() {
            club.potm = document.getElementById('set-p').value || club.potm;
            club.gol = document.getElementById('set-g').value || club.gol;
            save();
        }

        function toggle(id) {
            const p = club.p.find(x => x.id === id);
            p.in = !p.in;
            save();
        }

        function del(id) { club.p = club.p.filter(x => x.id !== id); save(); }

        function save() { localStorage.setItem('milanac_final_v11', JSON.stringify(club)); render(); }

        function render() {
            // Appello
            document.getElementById('list-h').innerHTML = club.p.map(p => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <span><b>${p.n}</b></span>
                    <button onclick="toggle(${p.id})" style="width:auto; padding:8px 15px; margin:0; background:${p.in?'#ff0000':'#333'}">${p.in?'IN':'OUT'}</button>
                </div>
            `).join('') || "<p style='text-align:center; color:#555;'>Aggiungi i player in ADMIN</p>";

            // Campo
            const f = document.getElementById('players-pitch');
            f.innerHTML = '';
            club.p.filter(p => p.in).forEach((p, i) => {
                const d = document.createElement('div');
                d.className = 'player';
                d.innerText = p.n.substring(0,3).toUpperCase();
                d.style.left = '20px'; d.style.top = (i*50+20)+'px';
                f.appendChild(d);
                d.ontouchmove = e => {
                    e.preventDefault();
                    let t = e.touches[0];
                    let r = document.getElementById('pitch').getBoundingClientRect();
                    d.style.left = (t.pageX - r.left - 22) + 'px';
                    d.style.top = (t.pageY - r.top - 22) + 'px';
                };
            });

            // Stats
            document.getElementById('v-potm').innerText = club.potm;
            document.getElementById('v-gol').innerText = club.gol;

            // Admin List
            document.getElementById('list-a').innerHTML = club.p.map(p => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>${p.n}</span>
                    <button onclick="del(${p.id})" style="width:auto; background:#444;">X</button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>

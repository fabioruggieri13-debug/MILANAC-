<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC - FC26 Hub</title>
    <style>
        :root { --neon: #ff0000; --bg: #050505; --card: #141414; --field: #0a2e18; --text: #ffffff; --sub: #888; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; user-select: none; padding-bottom: 80px; }
        
        /* Header & Nav */
        .header { text-align: center; border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 20px; }
        .header h1 { margin: 0; letter-spacing: 5px; font-size: 2rem; text-shadow: 0 0 10px var(--neon); }
        .nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .nav-btn { background: #222; color: var(--sub); padding: 8px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; text-transform: uppercase; border: 1px solid #333;}
        .nav-btn.active { background: var(--neon); color: white; border-color: var(--neon); box-shadow: 0 0 10px rgba(255,0,0,0.5); }

        /* Main Content */
        .page { display: none; }
        .page.active { display: block; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; }
        h2 { color: var(--neon); text-transform: uppercase; font-size: 0.9rem; margin-top: 0; margin-bottom: 10px; }

        /* Almanacco Rosa */
        .roster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        .player-card { background: #1a1a1a; border-radius: 10px; overflow: hidden; text-align: center; border: 1px solid #333; transition: 0.3s; position: relative;}
        .player-card:hover { border-color: var(--neon); transform: translateY(-3px); }
        .player-face { width: 100%; height: 100px; object-fit: cover; background: #333; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #555; font-weight: bold;}
        .player-info { padding: 8px; }
        .player-name { font-weight: bold; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-role-badge { font-size: 10px; color: var(--neon); text-transform: uppercase; font-weight: bold; margin-top: 2px;}
        
        /* Tactical Field & Tokens */
        #tacticalField { width: 100%; height: 320px; background: var(--field); border-radius: 8px; position: relative; border: 1px solid rgba(255,255,255,0.3); overflow: hidden; background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'), radial-gradient(circle at 50% 50%, transparent 15%, rgba(255,255,255,0.1) 16%, transparent 17%); }
        .player-token { width: 42px; height: 42px; background: var(--neon); color: white; border-radius: 50%; position: absolute; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; cursor: move; touch-action: none; box-shadow: 0 4px 10px rgba(0,0,0,0.8); z-index: 10; border: 2px solid white; text-transform: uppercase; }

        /* General UI */
        input, select, button, textarea { width: 100%; padding: 12px; margin: 5px 0; border-radius: 6px; border: none; box-sizing: border-box; font-size: 14px; background: #222; color: white; }
        button { background: var(--neon); color: white; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .btn-status { width: auto; padding: 5px 15px; font-size: 11px; background: #333; }
        .active-in { background: var(--neon); }
        .player-item { background: #1a1a1a; padding: 10px; margin: 5px 0; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .present { border-right: 4px solid var(--neon); }
    </style>
</head>
<body>

    <div class="header">
        <h1>MILANAC</h1>
        <small style="color:#666">FC26 COMMAND CENTER</small>
    </div>

    <div class="nav">
        <div class="nav-btn active" onclick="showPage('hub')">Hub</div>
        <div class="nav-btn" onclick="showPage('rosa')">Rosa</div>
        <div class="nav-btn" onclick="showPage('admin')">Admin</div>
    </div>

    <div id="page-hub" class="page active">
        <div class="card">
            <h2>LAVAGNA TATTICA</h2>
            <div id="tacticalField"></div>
            <button onclick="renderField()" style="background:#333; font-size:10px; margin-top:8px;">Resetta Posizioni</button>
        </div>
        <div class="card">
            <h2>CONVOCATI <button class="btn-status" onclick="copyInvites()" style="background:#0055ff">COPIA ID</button></h2>
            <div id="playerList"></div>
        </div>
    </div>

    <div id="page-rosa" class="page">
        <div class="card">
            <h2>ALMANACCO ROSSONERO</h2>
            <div id="rosterGrid" class="roster-grid">
                </div>
        </div>
    </div>

    <div id="page-admin" class="page">
        <div class="card">
            <h2>AGGIUNGI PLAYER</h2>
            <input type="text" id="playerName" placeholder="Gamertag / PSN">
            <select id="role">
                <option value="ATT">ATT</option><option value="CC">CENTRO</option><option value="DIFESA">DIFESA</option><option value="POR">POR</option>
            </select>
            <button onclick="addPlayer()">CONFERMA ACQUISTO</button>
        </div>
    </div>

    <script>
        // Carica dati
        let players = JSON.parse(localStorage.getItem('milanac_players') || "[]");
        
        // --- Sostituisci questo link con le foto vere dei tuoi amici ---
        const placeholderFace = "https://via.placeholder.com/150/333333/ff0000?text=FACCE"; 

        function save() { 
            localStorage.setItem('milanac_players', JSON.stringify(players)); 
            render(); 
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            event.target.classList.add('active');
            if(pageId === 'rosa') renderRoster();
            if(pageId === 'hub') renderField();
        }

        function addPlayer() {
            const name = document.getElementById('playerName').value;
            if (!name) return;
            // Aggiungiamo il campo 'faceUrl' che potrai modificare manualmente nel localStorage se vuoi
            players.push({ id: Date.now(), name, role: document.getElementById('role').value, present: false, faceUrl: placeholderFace });
            document.getElementById('playerName').value = "";
            save();
            alert(name + " aggiunto alla rosa!");
        }

        function togglePresence(id) {
            const p = players.find(x => x.id === id);
            p.present = !p.present;
            save();
        }

        function copyInvites() {
            const list = players.filter(p => p.present).map(p => p.name).join(", ");
            if(!list) return alert("Nessun player online!");
            navigator.clipboard.writeText(list).then(() => alert("ID copiati negli appunti!"));
        }

        // Renderizza la lista convocati (Hub)
        function renderList() {
            const container = document.getElementById('playerList');
            container.innerHTML = players.map(p => `
                <div class="player-item ${p.present ? 'present' : ''}">
                    <div><strong>${p.name}</strong> <small style="color:var(--neon)">${p.role}</small></div>
                    <button class="btn-status ${p.present ? 'active-in' : ''}" onclick="togglePresence(${p.id})">${p.present ? 'IN LOBBY' : 'OFFLINE'}</button>
                </div>
            `).join('');
        }

        // Renderizza la Lavagna Tattica (Hub)
        function renderField() {
            const field = document.getElementById('tacticalField');
            field.innerHTML = '';
            players.filter(p => p.present).forEach((p, index) => {
                const token = document.createElement('div');
                token.className = 'player-token';
                token.innerText = p.name.substring(0, 3).toUpperCase();
                token.style.left = (10 + (index * 5)) + 'px';
                token.style.top = (index * 45 + 10) + 'px';
                makeDraggable(token);
                field.appendChild(token);
            });
        }

        // Renderizza l'Almanacco Fotografico (Rosa)
        function renderRoster() {
            const grid = document.getElementById('rosterGrid');
            if(players.length === 0) { grid.innerHTML = "<p style='color:#666; font-size:12px; text-align:center;'>Nessun giocatore in rosa.</p>"; return; }
            
            grid.innerHTML = players.map(p => `
                <div class="player-card">
                    <img src="${placeholderFace}" alt="${p.name}" class="player-face">
                    <div class="player-info">
                        <div class="player-name">${p.name}</div>
                        <div class="player-role-badge">${p.role}</div>
                    </div>
                </div>
            `).join('');
        }

        // Drag & Drop
        function makeDraggable(el) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            el.onmousedown = dragStart;
            el.ontouchstart = dragStart;
            function dragStart(e) {
                const cx = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                const cy = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
                pos3 = cx; pos4 = cy;
                document.onmouseup = dragEnd; document.ontouchend = dragEnd;
                document.onmousemove = dragMove; document.ontouchmove = dragMove;
            }
            function dragMove(e) {
                const cx = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                const cy = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                pos1 = pos3 - cx; pos2 = pos4 - cy;
                pos3 = cx; pos4 = cy;
                el.style.top = (el.offsetTop - pos2) + "px"; el.style.left = (el.offsetLeft - pos1) + "px";
            }
            function dragEnd() { document.onmouseup = null; document.onmousemove = null; document.ontouchend = null; document.ontouchmove = null; }
        }

        function render() { renderList(); }
        window.onload = function() { render(); renderField(); };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC PRO V83 - STADIUM EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --rosso: #C61C23; --oro: #D4AF37; --nero: #000; --erba: #2e7d32; --linee: rgba(255,255,255,0.8); }
        body { margin: 0; background: var(--nero); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; touch-action: none; }
        
        #intro { position: fixed; inset: 0; background: radial-gradient(circle, #300 0%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        
        header { height: 60px; border-bottom: 2px solid var(--rosso); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: #000; z-index: 2000; position: relative; }
        .sidebar { position: fixed; top: 0; right: -100%; width: 280px; height: 100%; background: rgba(5,5,5,0.98); transition: 0.4s; z-index: 3000; border-left: 2px solid var(--rosso); padding-top: 60px; }
        .sidebar.active { right: 0; }
        .sidebar button { width: 100%; padding: 18px; background: none; border: none; color: white; text-align: left; font-weight: bold; border-bottom: 1px solid #222; text-transform: uppercase; cursor: pointer; }

        .container { height: calc(100vh - 60px); overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .page { display: none; } .page.active { display: block; }

        /* CAMPO PROFESSIONALE V83 */
        #pitch-container { width: 100%; position: relative; padding: 5px 0; touch-action: none; }
        #pitch { 
            width: 95%; aspect-ratio: 2/3; max-height: 75vh; margin: 0 auto; background: var(--erba); 
            border: 2px solid white; border-radius: 4px; position: relative; overflow: hidden;
            background-image: repeating-linear-gradient(0deg, #2e7d32, #2e7d32 40px, #266b2a 40px, #266b2a 80px);
        }
        
        /* Linee del campo */
        .p-line { position: absolute; border: 2px solid var(--linee); pointer-events: none; }
        .mid-line { top: 50%; width: 100%; height: 0; border-top: 2px solid var(--linee); }
        .mid-circle { top: 50%; left: 50%; width: 70px; height: 70px; border-radius: 50%; transform: translate(-50%, -50%); }
        .box-top { top: -2px; left: 50%; width: 60%; height: 15%; transform: translateX(-50%); border-top: none; }
        .box-bot { bottom: -2px; left: 50%; width: 60%; height: 15%; transform: translateX(-50%); border-bottom: none; }
        .goal-bot { bottom: -2px; left: 50%; width: 30%; height: 6%; transform: translateX(-50%); border-bottom: none; }

        /* GIOCATORI */
        .player { position: absolute; width: 54px; text-align: center; cursor: move; z-index: 100; touch-action: none; transition: transform 0.1s; }
        .jersey { width: 42px; height: 42px; background: #000; border: 2px solid var(--rosso); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.5); color: var(--oro); font-size: 16px; }
        .p-name { background: rgba(0,0,0,0.8); font-size: 10px; padding: 2px 5px; border-radius: 3px; margin-top: 3px; display: inline-block; font-weight: bold; text-transform: uppercase; white-space: nowrap; border: 1px solid #333; }

        .mod-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 10px; }
        .btn-mod { background: #000; border: 1px solid var(--oro); color: var(--oro); padding: 10px 0; font-weight: bold; border-radius: 4px; font-size: 10px; cursor: pointer; }
        .btn-mod.active { background: var(--oro); color: #000; }
        
        .btn-main { width: 100%; padding: 14px; background: var(--rosso); color: white; border: none; font-weight: bold; border-radius: 6px; text-transform: uppercase; cursor: pointer; }
        .card { background: #111; padding: 15px; margin-bottom: 12px; border-left: 5px solid var(--rosso); border-radius: 4px; }
    </style>
</head>
<body>

    <div id="intro">
        <h1 style="color:var(--oro); font-size: 2.5rem; margin:0; font-weight:900;">MILANAC</h1>
        <p style="letter-spacing: 3px; font-weight: bold;">BENVENUTO NEL CLUB</p>
        <button class="btn-main" style="width:180px; border-radius:30px;" onclick="document.getElementById('intro').style.display='none'">ENTRA</button>
    </div>

    <header>
        <div style="font-weight:900; color:var(--rosso); font-size:22px;">MILANAC <span style="color:white">PRO</span></div>
        <div onclick="document.querySelector('.sidebar').classList.add('active')" style="font-size:30px; cursor:pointer; color:var(--rosso)">☰</div>
    </header>

    <nav class="sidebar">
        <button onclick="go('rosa')">🛡️ Rosa</button>
        <button onclick="go('tattica')">📋 Lavagna Tattica</button>
        <button onclick="go('mercato')">💰 Mercato</button>
        <button onclick="go('partite')">🏟️ Partite</button>
        <button onclick="go('premi')">🏆 Premi</button>
        <button onclick="go('admin')">⚙️ Admin</button>
        <button onclick="document.querySelector('.sidebar').classList.remove('active')">Chiudi</button>
    </nav>

    <div class="container">
        <div id="p-rosa" class="page active"><div id="l-rosa"></div></div>
        
        <div id="p-tattica" class="page">
            <div class="mod-grid" id="mod-btns"></div>
            <div id="pitch-container">
                <div id="pitch">
                    <div class="p-line mid-line"></div>
                    <div class="p-line mid-circle"></div>
                    <div class="p-line box-top"></div>
                    <div class="p-line box-bot"></div>
                    <div class="p-line goal-bot"></div>
                    <div id="pitch-players"></div>
                </div>
            </div>
            <p style="text-align:center; font-size:10px; color:var(--oro); margin-top:5px;">Trascina i giocatori per rifinire la posizione</p>
        </div>

        <div id="p-mercato" class="page"><h3>VALORI MERCATO</h3><div id="l-mercato"></div></div>
        <div id="p-partite" class="page"><h3>GESTIONE PARTITE</h3><div id="l-partite"></div></div>
        <div id="p-premi" class="page"><h3>HALL OF FAME</h3><div id="l-premi"></div></div>
        
        <div id="p-admin" class="page">
            <div class="card">
                <input type="text" id="in-n" placeholder="Nome Giocatore">
                <input type="number" id="in-m" placeholder="Numero">
                <select id="in-r"><option>POR</option><option>DIF</option><option>CEN</option><option>ATT</option></select>
                <button class="btn-main" onclick="addP()">AGGIUNGI</button>
            </div>
            <div id="l-admin"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDbO_AxHKz1avQpYscoSSLpEfmFaL8MRGg", authDomain: "milanac-proclub.firebaseapp.com", projectId: "milanac-proclub", storageBucket: "milanac-proclub.firebasestorage.app", messagingSenderId: "61702234008", appId: "1:61702234008:web:aa597d8600d0a8251895ed" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        let data = { ps: [], mod: '4-4-2' };

        const modali = {
            '4-4-2': [{x:43,y:85},{x:10,y:70},{x:33,y:72},{x:55,y:72},{x:78,y:70},{x:10,y:45},{x:33,y:48},{x:55,y:48},{x:78,y:45},{x:33,y:20},{x:55,y:20}],
            '4-3-3': [{x:43,y:85},{x:10,y:70},{x:33,y:72},{x:55,y:72},{x:78,y:70},{x:25,y:48},{x:43,y:52},{x:62,y:48},{x:15,y:20},{x:43,y:15},{x:72,y:20}],
            '3-5-2': [{x:43,y:85},{x:25,y:72},{x:43,y:72},{x:62,y:72},{x:5,y:45},{x:28,y:48},{x:43,y:48},{x:58,y:48},{x:82,y:45},{x:33,y:20},{x:55,y:20}],
            '3-4-1-2': [{x:43,y:85},{x:25,y:72},{x:43,y:72},{x:62,y:72},{x:10,y:45},{x:33,y:48},{x:55,y:48},{x:78,y:45},{x:43,y:30},{x:33,y:15},{x:55,y:15}]
        };

        db.collection("milanac").doc("v83_stadium").onSnapshot(doc => { if(doc.exists) { data = doc.data(); render(); } });
        function sync() { db.collection("milanac").doc("v83_stadium").set(data); }

        function go(p) { document.querySelectorAll('.page').forEach(x=>x.classList.remove('active')); document.getElementById('p-'+p).classList.add('active'); document.querySelector('.sidebar').classList.remove('active'); }

        function addP() {
            const n=document.getElementById('in-n').value, m=document.getElementById('in-m').value, r=document.getElementById('in-r').value;
            if(n&&m){ data.ps.push({id:Date.now(), n, m, r, v:6.0, g:0, a:0, mvp:0, c:false, x:43, y:80}); sync(); }
        }

        function setModulo(m) {
            data.mod = m;
            const conv = data.ps.filter(p => p.c);
            conv.forEach((p, i) => { if(modali[m][i]) { p.x = modali[m][i].x; p.y = modali[m][i].y; } });
            sync();
        }

        function render() {
            let hR="", hA="", hMk="", hP="", hBtns="";
            data.ps.forEach(p => {
                hR += `<div class="card"><b>${p.n}</b> #${p.m}<br><button class="btn-main" style="width:auto; padding:5px 15px; margin-top:8px; background:${p.c?'green':'#333'}" onclick="const i=data.ps.findIndex(x=>x.id==${p.id}); data.ps[i].c=!data.ps[i].c; sync()">${p.c?'IN CAMPO':'SCHIERA'}</button></div>`;
                hA += `<div class="card">${p.n} <button onclick="data.ps=data.ps.filter(x=>x.id!==${p.id}); sync()">ELIMINA</button></div>`;
            });
            
            Object.keys(modali).forEach(m => { hBtns += `<button class="btn-mod ${data.mod==m?'active':''}" onclick="setModulo('${m}')">${m}</button>`; });
            document.getElementById('mod-btns').innerHTML = hBtns;
            document.getElementById('l-rosa').innerHTML = hR;
            document.getElementById('l-admin').innerHTML = hA;

            const pl = document.getElementById('pitch-players'); pl.innerHTML = "";
            data.ps.filter(p => p.c).forEach(p => {
                const d = document.createElement('div'); d.className = 'player';
                d.style.left = p.x + "%"; d.style.top = p.y + "%";
                d.innerHTML = `<div class="jersey">${p.m}</div><div class="p-name">${p.n}</div>`;
                
                let isDragging = false;
                const start = () => isDragging = true;
                const move = (e) => {
                    if (!isDragging) return;
                    const rect = document.getElementById('pitch').getBoundingClientRect();
                    const t = e.touches ? e.touches[0] : e;
                    p.x = ((t.clientX - rect.left) / rect.width) * 100 - 7;
                    p.y = ((t.clientY - rect.top) / rect.height) * 100 - 5;
                    d.style.left = p.x + "%"; d.style.top = p.y + "%";
                };
                const end = () => { if(isDragging) { isDragging = false; sync(); } };

                d.addEventListener('mousedown', start); d.addEventListener('touchstart', start);
                window.addEventListener('mousemove', move); window.addEventListener('touchmove', move);
                window.addEventListener('mouseup', end); window.addEventListener('touchend', end);
                pl.appendChild(d);
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC V82 - PRO DATABASE</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --rosso: #C61C23; --oro: #D4AF37; --nero: #000; --erba: #2e7d32; --erba-s: #1b5e20; }
        body { margin: 0; background: var(--nero); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        
        /* INTRO EMOZIONANTE */
        #intro { position: fixed; inset: 0; background: radial-gradient(circle, #400 0%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); filter: brightness(1.2); } }

        /* LAYOUT */
        header { height: 60px; border-bottom: 2px solid var(--rosso); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: #080808; position: relative; z-index: 2000; }
        .sidebar { position: fixed; top: 60px; right: -100%; width: 280px; height: 100%; background: rgba(10,10,10,0.95); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1900; border-left: 2px solid var(--rosso); }
        .sidebar.active { right: 0; }
        .sidebar button { width: 100%; padding: 20px; background: none; border: none; color: white; text-align: left; font-weight: bold; border-bottom: 1px solid #222; text-transform: uppercase; }

        .container { height: calc(100vh - 60px); overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .page { display: none; } .page.active { display: block; }

        /* CAMPO HD */
        #pitch { width: 100%; aspect-ratio: 3/4; max-height: 480px; background: var(--erba); margin: 0 auto; position: relative; border: 2px solid white; border-radius: 8px; background-image: repeating-linear-gradient(0deg, var(--erba), var(--erba) 45px, var(--erba-s) 45px, var(--erba-s) 90px); box-shadow: 0 10px 30px #000; }
        .player { position: absolute; width: 55px; text-align: center; cursor: pointer; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .jersey { width: 44px; height: 44px; background: #000; border: 2px solid var(--rosso); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.5); font-size: 16px; color: var(--oro); }
        .p-name { background: rgba(0,0,0,0.85); font-size: 10px; padding: 2px 5px; border-radius: 3px; margin-top: 4px; display: inline-block; font-weight: bold; text-transform: uppercase; }

        /* CARDS */
        .card { background: #111; padding: 15px; margin-bottom: 12px; border-left: 5px solid var(--rosso); border-radius: 4px; position: relative; }
        .v-badge { position: absolute; right: 15px; top: 15px; background: var(--oro); color: #000; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        
        /* MODALE GIOCATORE */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: none; padding: 30px; overflow-y: auto; }
        .modal-content { background: #111; border: 2px solid var(--oro); border-radius: 15px; padding: 20px; position: relative; max-width: 400px; margin: auto; }
        .history-dot { display: inline-block; width: 25px; height: 25px; line-height: 25px; border-radius: 50%; background: var(--rosso); font-size: 10px; text-align: center; margin-right: 5px; font-weight: bold; }

        .btn-main { width: 100%; padding: 14px; background: var(--rosso); color: white; border: none; font-weight: bold; border-radius: 6px; text-transform: uppercase; margin-top: 10px; cursor: pointer; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="intro">
        <h1 style="color:var(--oro); font-size: 3.5rem; margin:0; font-weight:900;">MILANAC</h1>
        <p style="letter-spacing: 5px; font-weight:bold;">V82 ULTIMATE CLOUD</p>
        <button class="btn-main" style="width:200px; border-radius:30px; margin-top:20px;" onclick="document.getElementById('intro').style.display='none'">ENTRA</button>
    </div>

    <header>
        <div style="font-weight:900; color:var(--rosso); font-size:22px;">MILANAC PRO</div>
        <div onclick="document.querySelector('.sidebar').classList.toggle('active')" style="font-size:30px; cursor:pointer; color:var(--rosso);">☰</div>
    </header>

    <nav class="sidebar">
        <button onclick="go('rosa')">🛡️ Rosa</button>
        <button onclick="go('tattica')">📋 Lavagna Tattica</button>
        <button onclick="go('admin')">⚙️ Area Admin</button>
    </nav>

    <div class="container">
        <div id="p-rosa" class="page active"><div id="l-rosa"></div></div>
        
        <div id="p-tattica" class="page">
            <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:5px; margin-bottom:15px;">
                <button onclick="setM('4-4-2')" class="btn-main" style="font-size:9px; padding:8px;">4-4-2</button>
                <button onclick="setM('4-3-3')" class="btn-main" style="font-size:9px; padding:8px;">4-3-3</button>
                <button onclick="setM('3-5-2')" class="btn-main" style="font-size:9px; padding:8px;">3-5-2</button>
                <button onclick="setM('3-4-1-2')" class="btn-main" style="font-size:9px; padding:8px;">3-4-1-2</button>
            </div>
            <div id="pitch"><div id="pitch-l"></div></div>
        </div>

        <div id="p-admin" class="page">
            <div class="card">
                <input type="text" id="in-n" placeholder="Nome"><input type="number" id="in-m" placeholder="Numero Maglia">
                <select id="in-r"><option>POR</option><option>DIF</option><option>CEN</option><option>ATT</option></select>
                <button class="btn-main" onclick="addP()">AGGIUNGI GIOCATORE</button>
            </div>
            <div id="l-admin"></div>
        </div>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="m-nome" style="color:var(--oro); margin-top:0;"></h2>
            <p id="m-ruolo"></p>
            <hr border-color="#333">
            <h4>ULTIMI 5 VOTI:</h4>
            <div id="m-history"></div>
            <hr border-color="#333">
            <div style="display:flex; justify-content: space-between;">
                <div>GOL: <b id="m-gol"></b></div>
                <div>ASSIST: <b id="m-ast"></b></div>
                <div>MVP: <b id="m-mvp"></b></div>
            </div>
            <button class="btn-main" onclick="document.getElementById('modal').style.display='none'">CHIUDI</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDbO_AxHKz1avQpYscoSSLpEfmFaL8MRGg", authDomain: "milanac-proclub.firebaseapp.com", projectId: "milanac-proclub", storageBucket: "milanac-proclub.firebasestorage.app", messagingSenderId: "61702234008", appId: "1:61702234008:web:aa597d8600d0a8251895ed" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        let data = { ps: [], mod: '4-4-2' };

        db.collection("milanac").doc("v82_ultra").onSnapshot(doc => { if(doc.exists) { data = doc.data(); render(); } });
        function sync() { db.collection("milanac").doc("v82_ultra").set(data); }

        function go(p) { document.querySelectorAll('.page').forEach(x=>x.classList.remove('active')); document.getElementById('p-'+p).classList.add('active'); document.querySelector('.sidebar').classList.remove('active'); }

        function addP() {
            const n=document.getElementById('in-n').value, m=document.getElementById('in-m').value, r=document.getElementById('in-r').value;
            if(n&&m){ data.ps.push({id:Date.now(), n, m, r, v:6.0, g:0, a:0, mvp:0, c:false, h:[]}); sync(); }
        }

        const coords = {
            '4-4-2': [{x:50,y:85},{x:20,y:70},{x:40,y:70},{x:60,y:70},{x:80,y:70},{x:20,y:45},{x:40,y:45},{x:60,y:45},{x:80,y:45},{x:40,y:20},{x:60,y:20}],
            '4-3-3': [{x:50,y:85},{x:20,y:70},{x:40,y:70},{x:60,y:70},{x:80,y:70},{x:30,y:45},{x:50,y:45},{x:70,y:45},{x:20,y:20},{x:50,y:15},{x:80,y:20}],
            '3-5-2': [{x:50,y:85},{x:30,y:70},{x:50,y:70},{x:70,y:70},{x:15,y:45},{x:35,y:45},{x:50,y:45},{x:65,y:45},{x:85,y:45},{x:40,y:20},{x:60,y:20}],
            '3-4-1-2': [{x:50,y:85},{x:30,y:70},{x:50,y:70},{x:70,y:70},{x:20,y:45},{x:40,y:45},{x:60,y:45},{x:80,y:45},{x:50,y:30},{x:40,y:15},{x:60,y:15}]
        };

        function setM(m) { data.mod = m; sync(); }

        function openP(id) {
            const p = data.ps.find(x=>x.id==id);
            document.getElementById('m-nome').innerText = p.n.toUpperCase();
            document.getElementById('m-ruolo').innerText = p.ruolo + " #" + p.m;
            document.getElementById('m-gol').innerText = p.g;
            document.getElementById('m-ast').innerText = p.a || 0;
            document.getElementById('m-mvp').innerText = p.mvp;
            document.getElementById('m-history').innerHTML = (p.h || []).slice(-5).map(v => `<span class="history-dot">${v}</span>`).join('') || "Nessun voto registrato";
            document.getElementById('modal').style.display='flex';
        }

        function render() {
            let hR="", hA="";
            data.ps.forEach(p => {
                hR += `<div class="card" onclick="openP(${p.id})"><div class="v-badge">${p.v}</div><b style="color:var(--rosso)">${p.n}</b> #${p.m}<br><small>GOL: ${p.g} | AST: ${p.a||0}</small><button class="btn-main" style="padding:6px; width:auto; margin-top:5px; background:${p.c?'#2e7d32':'#333'}" onclick="event.stopPropagation(); const i=data.ps.findIndex(x=>x.id==${p.id}); data.ps[i].c=!data.ps[i].c; sync()">${p.c?'IN CAMPO':'SCHIERA'}</button></div>`;
                hA += `<div class="card"><b>${p.n}</b><div style="display:flex; flex-wrap:wrap; gap:5px; margin-top:8px;">
                    Voto: <input type="number" step="0.5" value="${p.v}" style="width:50px; margin:0" onchange="const i=data.ps.findIndex(x=>x.id==${p.id}); data.ps[i].v=parseFloat(this.value); data.ps[i].h.push(parseFloat(this.value)); sync()">
                    G: <button onclick="const i=data.ps.findIndex(x=>x.id==${p.id}); data.ps[i].g++; sync()">+</button>
                    A: <button onclick="const i=data.ps.findIndex(x=>x.id==${p.id}); data.ps[i].a=(data.ps[i].a||0)+1; sync()">+</button>
                    MVP: <button onclick="const i=data.ps.findIndex(x=>x.id==${p.id}); data.ps[i].mvp++; sync()">+</button>
                    <button onclick="data.ps=data.ps.filter(x=>x.id!==${p.id}); sync()" style="color:red; background:none; border:none; margin-left:auto">X</button>
                </div></div>`;
            });
            document.getElementById('l-rosa').innerHTML = hR; document.getElementById('l-admin').innerHTML = hA;
            const pl = document.getElementById('pitch-l'); pl.innerHTML = ""; const act = data.ps.filter(p => p.c); const c = coords[data.mod || '4-4-2'];
            act.forEach((p, i) => { if(i<11) {
                const d=document.createElement('div'); d.className='player'; d.style.left=`calc(${c[i].x}% - 27px)`; d.style.top=`calc(${c[i].y}% - 27px)`;
                d.onclick = () => openP(p.id);
                d.innerHTML=`<div class="jersey">${p.m}</div><div class="p-name">${p.n}</div>`; pl.appendChild(d);
            }});
        }
    </script>
</body>
</html>

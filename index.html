<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC PRO CLUB</title>
    <style>
        :root { --red: #C61C23; --bg: #000; --card: #121212; --gold: #D4AF37; --grass: #2e7d32; }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }

        /* INTRO CON CARICAMENTO LOGO */
        #intro { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; text-align: center; }
        
        .upload-zone {
            width: 200px; height: 200px; border: 3px dashed var(--red); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            cursor: pointer; margin-bottom: 20px; background: #080808;
        }
        #logo-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .upload-zone span { font-size: 12px; color: var(--red); font-weight: bold; padding: 10px; }

        .btn-entra { background: var(--red); color: white; border: none; padding: 15px 50px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; }

        /* INTERFACCIA */
        header { height: 60px; background: #080808; border-bottom: 2px solid var(--red); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .nav-menu { position: absolute; top: 60px; right: 0; background: #0a0a0a; width: 200px; display: none; flex-direction: column; border: 1px solid var(--red); z-index: 5000; }
        .nav-menu button { background: none; border: none; color: white; padding: 15px; text-align: left; border-bottom: 1px solid #222; }

        .container { height: calc(100vh - 60px); overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .page { display: none; } .active { display: block; }
        
        .card { background: var(--card); border-radius: 10px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--red); }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 5px; }
        .btn-red { background: var(--red); color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="intro">
        <div class="upload-zone" onclick="document.getElementById('input-file').click()">
            <img id="logo-img" src="" alt="Logo">
            <span id="txt-up">TOCCA QUI PER CARICARE IL LOGO</span>
        </div>
        <input type="file" id="input-file" style="display:none" accept="image/*">
        <h1 style="margin:0">MILANAC</h1>
        <p style="color:var(--gold)">PRO CLUB GESTIONALE</p>
        <button class="btn-entra" onclick="entra()">ENTRA</button>
    </div>

    <header>
        <div style="font-weight:bold; color:var(--red)">MILANAC</div>
        <div onclick="toggleMenu()" style="cursor:pointer; font-size:24px">☰</div>
        <div id="menu" class="nav-menu">
            <button onclick="showPage('rosa')">ROSA</button>
            <button onclick="showPage('news')">NEWS</button>
            <button onclick="showPage('admin')">ADMIN</button>
        </div>
    </header>

    <div class="container">
        <div id="page-rosa" class="page active">
            <h2 style="text-align:center">LA SQUADRA</h2>
            <div id="lista-giocatori"></div>
        </div>

        <div id="page-news" class="page">
            <h2 style="text-align:center">COMUNICATI</h2>
            <div id="lista-news"></div>
        </div>

        <div id="page-admin" class="page">
            <h2 style="text-align:center">AREA GESTIONE</h2>
            <input type="password" id="pass" placeholder="Password Admin">
            <button class="btn-red" onclick="login()">ACCEDI</button>
            <div id="admin-box" style="display:none; margin-top:20px;">
                <input type="text" id="new-n" placeholder="Nome Giocatore">
                <input type="number" id="new-m" placeholder="Numero Maglia">
                <button class="btn-red" onclick="aggiungiG()">AGGIUNGI</button>
                <hr style="margin:20px 0; border:0; border-top:1px solid #333">
                <textarea id="new-news" placeholder="Scrivi una notizia..."></textarea>
                <button class="btn-red" onclick="aggiungiN()">PUBBLICA</button>
            </div>
        </div>
    </div>

    <script>
        let db = { giocatori: [], news: [], logo: "" };

        function load() {
            const data = localStorage.getItem('milanac_v61');
            if(data) {
                db = JSON.parse(data);
                if(db.logo) {
                    const img = document.getElementById('logo-img');
                    img.src = db.logo;
                    img.style.display = 'block';
                    document.getElementById('txt-up').style.display = 'none';
                }
            }
        }

        document.getElementById('input-file').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function() {
                db.logo = reader.result;
                document.getElementById('logo-img').src = reader.result;
                document.getElementById('logo-img').style.display = 'block';
                document.getElementById('txt-up').style.display = 'none';
                save();
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function entra() { document.getElementById('intro').style.display = 'none'; render(); }
        function toggleMenu() { const m = document.getElementById('menu'); m.style.display = (m.style.display==='flex')?'none':'flex'; }
        function showPage(p) { 
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.getElementById('page-'+p).classList.add('active');
            toggleMenu();
        }
        function login() { if(document.getElementById('pass').value === 'milan') document.getElementById('admin-box').style.display='block'; }
        function save() { localStorage.setItem('milanac_v61', JSON.stringify(db)); render(); }

        function aggiungiG() { 
            const n = document.getElementById('new-n').value;
            const m = document.getElementById('new-m').value;
            if(n && m) { db.giocatori.push({n, m}); save(); }
        }

        function aggiungiN() {
            const txt = document.getElementById('new-news').value;
            if(txt) { db.news.unshift({txt, d: new Date().toLocaleDateString()}); save(); }
        }

        function render() {
            document.getElementById('lista-giocatori').innerHTML = db.giocatori.map(g => `
                <div class="card"><b>#${g.m}</b> - ${g.n.toUpperCase()}</div>
            `).join('');
            document.getElementById('lista-news').innerHTML = db.news.map(n => `
                <div class="card"><small>${n.d}</small><p>${n.txt}</p></div>
            `).join('');
        }

        load();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILANAC ULTIMATE</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 10px; }
        .neon-title { color: #ff0000; text-align: center; text-shadow: 0 0 10px #ff0000; font-size: 2rem; }
        section { background: #111; border: 1px solid #333; border-radius: 15px; padding: 15px; margin-bottom: 30px; }
        h2 { color: #ff0000; border-bottom: 1px solid #333; padding-bottom: 5px; text-transform: uppercase; font-size: 1rem; }
        
        /* Campo Tattico sempre visibile */
        #campo { width: 100%; height: 400px; background: #0a2e18; border: 2px solid #fff; position: relative; border-radius: 10px; overflow: hidden; touch-action: none; }
        .pedina { width: 45px; height: 45px; background: #ff0000; color: #fff; border-radius: 50%; position: absolute; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #fff; z-index: 10; font-size: 10px; }

        input, select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 1rem; }
        button { background: #ff0000; color: #fff; font-weight: bold; }
        .player-row { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 10px; border-radius: 8px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h1 class="neon-title">MILANAC</h1>

    <section>
        <h2>1. AGGIUNGI GIOCATORI</h2>
        <input type="text" id="nome" placeholder="Nome Gamertag">
        <select id="ruolo"><option>ATT</option><option>CC</option><option>DIF</option><option>POR</option></select>
        <button onclick="aggiungi()">AGGIUNGI ORA</button>
    </section>

    <section>
        <h2>2. CHI C'È STASERA?</h2>
        <div id="lista-appello"></div>
    </section>

    <section>
        <h2>3. LAVAGNA TATTICA</h2>
        <div id="campo"></div>
        <p style="font-size: 10px; color: #888;">Trascina i nomi sul campo verde.</p>
    </section>

    <script>
        let rosa = JSON.parse(localStorage.getItem('milanac_v5') || "[]");

        function aggiungi() {
            const n = document.getElementById('nome').value;
            if(!n) return;
            rosa.push({ id: Date.now(), n, r: document.getElementById('ruolo').value, attivo: false });
            document.getElementById('nome').value = "";
            salva();
        }

        function toggle(id) {
            const p = rosa.find(x => x.id === id);
            p.attivo = !p.attivo;
            salva();
        }

        function salva() {
            localStorage.setItem('milanac_v5', JSON.stringify(rosa));
            aggiorna();
        }

        function aggiorna() {
            // Lista Appello
            document.getElementById('lista-appello').innerHTML = rosa.map(p => `
                <div class="player-row">
                    <span>${p.n} (${p.r})</span>
                    <button style="width:auto; padding:5px 20px; background:${p.attivo?'#ff0000':'#444'}" onclick="toggle(${p.id})">
                        ${p.attivo ? 'IN CAMPO' : 'ASSENTE'}
                    </button>
                </div>
            `).join('') || "Nessun giocatore. Aggiungilo sopra!";

            // Campo
            const campo = document.getElementById('campo');
            campo.innerHTML = '';
            rosa.filter(p => p.attivo).forEach((p, i) => {
                const d = document.createElement('div');
                d.className = 'pedina';
                d.innerText = p.n.substring(0,3).toUpperCase();
                d.style.left = '10px';
                d.style.top = (i * 50 + 10) + 'px';
                campo.appendChild(d);
                
                // Movimento
                d.ontouchmove = e => {
                    e.preventDefault();
                    let t = e.touches[0];
                    let rect = campo.getBoundingClientRect();
                    d.style.left = (t.pageX - rect.left - 22) + 'px';
                    d.style.top = (t.pageY - rect.top - 22) + 'px';
                };
            });
        }
        window.onload = aggiorna;
    </script>
</body>
</html>

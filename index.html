<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC PROCLUB V69 - TOTAL CONTROL</title>
    <style>
        :root { --rosso: #C61C23; --nero: #000; --scuro: #121212; --oro: #D4AF37; --ciano: #00e5ff; --erba: #2e7d32; --erba-scura: #1b5e20; }
        body, html { margin: 0; padding: 0; background: var(--nero); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; overflow: hidden; }

        /* --- INTRODUZIONE MILANAC PROCLUB DILAMANTE --- */
        #intro { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 10000; text-align: center; transition: opacity 0.8s ease, transform 0.8s ease; 
        }
        
        /* Titolo Cangiante e Sfumato */
        .titolo-milanac { 
            font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; margin: 0; 
            background: linear-gradient(45deg, #fff, var(--rosso), var(--oro), #fff); 
            background-size: 300% 300%; 
            -webkit-background-clip: text; color: transparent; 
            animation: sfumaturaCangiante 5s infinite linear; 
        }
        
        /* Orbita Pulsante Neon */
        .orbita-pulsante { 
            width: 120px; height: 120px; background: transparent; border-radius: 50%; 
            margin-bottom: 30px; position: relative; 
            border: 4px solid var(--rosso); box-shadow: 0 0 30px var(--rosso); 
            animation: battitoNeon 2s infinite ease-in-out; 
        }
        
        .sotto-messaggio { color: var(--gold); letter-spacing: 5px; font-weight: bold; margin-bottom: 40px; font-size: 1rem; }
        
        /* Bottone Entra in Campo */
        .btn-entra { 
            background: transparent; color: white; border: 2px solid #fff; 
            padding: 16px 50px; border-radius: 50px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 3px; font-size: 13px; 
            transition: 0.3s; 
        }
        .btn-entra:hover { background: var(--rosso); border-color: var(--rosso); box-shadow: 0 0 30px var(--rosso); }

        /* HEADER & NAVIGAZIONE */
        header { height: 65px; background: #080808; border-bottom: 2px solid var(--rosso); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: relative; z-index: 2000; }
        .burger { font-size: 32px; color: var(--rosso); cursor: pointer; }
        .nav-laterale { position: absolute; top: 65px; right: 0; background: #0a0a0a; width: 260px; display: none; flex-direction: column; border-left: 2px solid var(--rosso); height: calc(100vh - 65px); z-index: 1900; }
        .nav-laterale button { background: none; border: none; color: white; padding: 20px; text-align: left; border-bottom: 1px solid #1a1a1a; font-weight: bold; text-transform: uppercase; font-size: 13px; }

        /* CONTENUTI */
        .area-principale { height: calc(100vh - 65px); overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .pagina { display: none; } .attiva { display: block; }

        /* CAMPO TATTICO RESTAURATO */
        .pitch-box { width: 100%; display: flex; justify-content: center; padding: 10px 0; }
        #pitch { 
            width: 90vw; height: 130vw; max-height: 520px; background: var(--erba); border: 3px solid #fff; border-radius: 5px; position: relative; overflow: hidden; touch-action: none;
            background-image: repeating-linear-gradient(0deg, var(--erba), var(--erba) 45px, var(--erba-scura) 45px, var(--erba-scura) 90px);
        }
        .linea-metà { position: absolute; top: 50%; width: 100%; height: 2px; background: #fff; opacity: 0.7; }
        .cerchio-centrale { position: absolute; top: 50%; left: 50%; width: 80px; height: 80px; border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.7; }
        .area-r { position: absolute; width: 55%; height: 16%; border: 2px solid #fff; left: 22.5%; }
        .area-t { top: -2px; border-top: none; } .area-b { bottom: -2px; border-bottom: none; }

        /* SCHEDE GIOCATORI */
        .scheda { background: var(--scuro); border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--rosso); position: relative; }
        .prezzo-mercato { float: right; color: #4caf50; font-weight: 900; font-size: 1.1rem; }
        .griglia-stat { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .stat-box { background: #1a1a1a; padding: 8px; border-radius: 6px; text-align: center; }
        .stat-box small { font-size: 9px; color: #888; display: block; text-transform: uppercase; margin-bottom: 2px; }

        .badge-premio { display: flex; gap: 5px; margin: 8px 0; }
        .tag-premio { font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: 900; text-transform: uppercase; }
        .potm { background: var(--oro); color: black; } .mvp { background: var(--ciano); color: black; }

        input, textarea { width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #333; color: white; margin-bottom: 10px; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn-milanac { background: var(--rosso); color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        
        /* PEDINE TRASCINABILI */
        .pedina { position: absolute; width: 55px; text-align: center; z-index: 100; cursor: move; touch-action: none; }
        .maglia { width: 40px; height: 40px; background: #000; border: 2px solid var(--rosso); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin: 0 auto; box-shadow: 0 4px 8px rgba(0,0,0,0.5); font-size: 14px; }
        .nome-pedina { background: rgba(0,0,0,0.8); font-size: 9px; padding: 2px 5px; border-radius: 3px; margin-top: 3px; display: inline-block; font-weight: bold; }

        /* ANIMAZIONI INTRO */
        @keyframes battitoNeon { 0%, 100% { transform: scale(1); box-shadow: 0 0 20px var(--rosso); } 50% { transform: scale(1.08); box-shadow: 0 0 50px var(--rosso), 0 0 15px var(--oro); } }
        @keyframes sfumaturaCangiante { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body>

    <div id="intro">
        <div class="orbita-pulsante"></div>
        <h1 class="titolo-milanac">MILANAC PROCLUB</h1>
        <p class="sotto-messaggio">TOTAL CONTROL MANAGER</p>
        <button class="btn-entra" onclick="entraInCampo()">Entra in Campo</button>
    </div>

    <header>
        <div style="font-weight:900; color:var(--rosso); font-size:22px; letter-spacing:-1px">MILANAC PC</div>
        <div class="burger" onclick="toggleNav()">☰</div>
        <nav id="nav" class="nav-laterale">
            <button onclick="vaiAPagina('rosa')">La Squadra</button>
            <button onclick="vaiAPagina('tattica')">Lavagna Tattica</button>
            <button onclick="vaiAPagina('mercato')">Valore di Mercato</button>
            <button onclick="vaiAPagina('notizie')">Comunicati News</button>
            <button onclick="vaiAPagina('admin')">Area Amministratore</button>
        </nav>
    </header>

    <div class="area-principale">
        <div id="p-rosa" class="pagina attiva">
            <h2 style="text-align:center; color:var(--rosso)">SQUADRA</h2>
            <div id="lista-rosa"></div>
        </div>

        <div id="p-tattica" class="pagina">
            <h2 style="text-align:center; color:var(--rosso)">LAVAGNA</h2>
            <div class="pitch-box">
                <div id="pitch">
                    <div class="area-r area-t"></div>
                    <div class="linea-metà"></div>
                    <div class="cerchio-centrale"></div>
                    <div class="area-r area-b"></div>
                    <div id="pedine-campo"></div>
                </div>
            </div>
            <p style="text-align:center; font-size:11px; color:#555; margin-top:10px">Trascina i convocati per posizionarli.</p>
        </div>

        <div id="p-mercato" class="pagina">
            <h2 style="text-align:center; color:var(-- gold)">HALL OF FAME</h2>
            <div id="lista-mercato"></div>
        </div>

        <div id="p-notizie" class="page attiva">
            <h2 style="text-align:center; color:var(--rosso)">NEWS</h2>
            <div id="lista-notizie"></div>
        </div>

        <div id="p-admin" class="page attiva">
            <h2 style="text-align:center">PANNELLO ADMIN</h2>
            <input type="password" id="pass-admin" placeholder="Password Admin (milan)">
            <button class="btn-milanac" onclick="login()">ACCEDI</button>
            <div id="box-admin" style="display:none; margin-top:20px;">
                <div class="scheda">
                    <h3>Aggiungi Giocatore</h3>
                    <input type="text" id="nuovo-n" placeholder="Nome">
                    <input type="number" id="nuovo-m" placeholder="Numero">
                    <button class="btn-milanac" onclick="aggiungiGiocatore()">SALVA PLAYER</button>
                </div>
                <div class="scheda">
                    <h3>Pubblica News</h3>
                    <input type="text" id="nuovo-nt" placeholder="Titolo">
                    <textarea id="nuovo-nb" placeholder="Testo..."></textarea>
                    <button class="btn-milanac" onclick="aggiungiNews()">INVIA COMUNICATO</button>
                </div>
                <div id="adm-lista-giocatori"></div>
            </div>
        </div>
    </div>

    <script>
        let db = { ps: [], ns: [] };

        function load() {
            const saved = localStorage.getItem('milanac_total_V69');
            if(saved) db = JSON.parse(saved);
        }

        function entraInCampo() { document.getElementById('intro').style.display='none'; render(); }
        function toggleNav() { const n = document.getElementById('nav'); n.style.display = (n.style.display==='flex')?'none':'flex'; }
        function vaiAPagina(p) { document.querySelectorAll('.pagina').forEach(x=>x.classList.remove('attiva')); document.getElementById('p-'+p).classList.add('attiva'); toggleNav(); render(); }
        function login() { if(document.getElementById('pass-admin').value === 'milan') document.getElementById('box-admin').style.display='block'; }
        function save() { localStorage.setItem('milanac_total_V69', JSON.stringify(db)); render(); }

        function aggiungiGiocatore() {
            const n = document.getElementById('nuovo-n').value; const m = document.getElementById('nuovo-m').value;
            if(n && m) { db.ps.push({id:Date.now(), n, m, p:0, g:0, a:0, v:[], potm:0, mvp:0, in:false}); save(); }
        }

        function aggiungiNews() {
            const t = document.getElementById('nuovo-nt').value; const b = document.getElementById('nuovo-nb').value;
            if(t && b) { db.ns.unshift({t, b, d: new Date().toLocaleDateString()}); save(); }
        }

        function getValore(p) {
            let base = 10 + (p.g * 5) + (p.a * 3) + (p.p * 1) + (p.potm * 10) + (p.mvp * 15);
            if(p.v.length > 0) base *= ((p.v.reduce((a,b)=>a+b,0) / p.v.length) / 6);
            return base.toFixed(1);
        }

        function render() {
            // ROSA
            document.getElementById('lista-rosa').innerHTML = db.ps.map(p => `
                <div class="scheda">
                    <span class="prezzo-mercato">€${getValore(p)}M</span>
                    <b>#${p.m} ${p.n.toUpperCase()}</b>
                    <div class="badge-premio">${p.potm?`<span class="tag-premio potm">POTM x${p.potm}</span>`:''}${p.mvp?`<span class="tag-premio mvp">MVP x${p.mvp}</span>`:''}</div>
                    <div class="griglia-stat">
                        <div class="stat-box"><small>Pres</small><b>${p.p}</b></div><div class="stat-box"><small>Gol</small><b>${p.g}</b></div>
                        <div class="stat-box"><small>Ass</small><b>${p.a}</b></div><div class="stat-box"><small>Mv</small><b>${p.v.length?(p.v.reduce((a,b)=>a+b,0)/p.v.length).toFixed(1):'-'}</b></div>
                    </div>
                    <button class="btn-milanac" style="margin-top:10px; background:${p.in?'var(--rosso)':'#333'}" onclick="db.ps.find(x=>x.id===${p.id}).in=!db.ps.find(x=>x.id===${p.id}).in; save();">${p.in?'CONVOCATO':'ASSENTE'}</button>
                </div>`).join('');

            // MERCATO
            let sortedVal = [...db.ps].sort((a,b)=> getValore(b) - getValore(a));
            document.getElementById('lista-mercato').innerHTML = sortedVal.map((p,i)=>`
                <div class="scheda"><b>${i+1}. ${p.n}</b> <span class="prezzo-mercato">€${getValore(p)}M</span><div style="font-size:10px; color:var(--gold)">Titoli Totali: ${p.potm+p.mvp}</div></div>`).join('');

            // NEWS
            document.getElementById('lista-notizie').innerHTML = db.ns.map(n=>`
                <div class="scheda"><small>${n.d}</small><h3 style="margin:5px 0; color:var(--rosso)">${n.t}</h3><p style="margin:0; font-size:14px">${n.b}</p></div>`).join('');

            // LAVAGNA (RESTORED)
            const campo = document.getElementById('pedine-campo'); campo.innerHTML = '';
            db.ps.filter(p=>p.in).forEach((p,i)=>{
                const tok = document.createElement('div'); tok.className='pedina'; tok.style.left='20px'; tok.style.top=(i*55+20)+'px';
                tok.innerHTML=`<div class="maglia">${p.m}</div><div class="nome-pedina">${p.n}</div>`; campo.appendChild(tok);
                tok.addEventListener('touchmove', e => {
                    e.preventDefault(); let t=e.touches[0], r=document.getElementById('pitch').getBoundingClientRect();
                    tok.style.left=(t.pageX-r.left-27)+'px'; tok.style.top=(t.pageY-r.top-20)+'px';
                });
            });

            // GESTIONE ADMIN PROTEGGI-VOTI
            document.getElementById('adm-lista-giocatori').innerHTML = db.ps.map(p => `
                <div class="scheda">
                    <b>${p.n} (#${p.m})</b>
                    <div style="display:flex; gap:5px; margin:10px 0">
                        <input type="number" value="${p.p}" onchange="db.ps.find(x=>x.id===${p.id}).p=parseInt(this.value);save()">
                        <input type="number" value="${p.g}" onchange="db.ps.find(x=>x.id===${p.id}).g=parseInt(this.value);save()">
                        <input type="number" value="${p.a}" onchange="db.ps.find(x=>x.id===${p.id}).a=parseInt(this.value);save()">
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button onclick="db.ps.find(x=>x.id===${p.id}).potm++;save()" style="flex:1; background:var(--gold); color:black; border:none; padding:8px; border-radius:4px">POTM</button>
                        <button onclick="db.ps.find(x=>x.id===${p.id}).mvp++;save()" style="flex:1; background:var(--ciano); color:black; border:none; padding:8px; border-radius:4px">MVP</button>
                    </div>
                    <button class="btn-milanac" style="background:#444; margin-top:5px" onclick="let v=prompt('Voto Partita:'); if(v){db.ps.find(x=>x.id===${p.id}).v.push(parseFloat(v.replace(',','.')));save()}">AGGIUNGI VOTO</button>
                    <button onclick="if(confirm('Eliminare player?')){db.ps=db.ps.filter(x=>x.id!==${p.id});save()}" style="color:red; background:none; border:none; width:100%; font-size:10px; margin-top:10px">ELIMINA DEFINITIVAMENTE</button>
                </div>`).join('');
        }
        load();
    </script>
</body>
</html>

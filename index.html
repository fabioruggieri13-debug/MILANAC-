<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC V56 - PRO CLUB</title>
    <style>
        :root { --red: #C61C23; --bg: #000; --card: #121212; --gold: #D4AF37; --grass: #2e7d32; --grass-dark: #266b2a; }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* --- INTRODUZIONE EPICA --- */
        #intro { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 10000; transition: opacity 0.8s ease, transform 0.8s ease; 
        }
        .logo-box {
            width: 280px; height: 280px;
            background: url('https://i.ibb.co/3ykYmS9/1000305770.jpg') no-repeat center;
            background-size: contain;
            filter: drop-shadow(0 0 15px var(--red));
            animation: pulseLogo 2.5s infinite ease-in-out;
            margin-bottom: 20px;
        }
        .welcome-msg { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; margin: 0; color: #fff; }
        .sub-msg { color: var(--gold); letter-spacing: 4px; font-size: 1rem; font-weight: bold; margin-bottom: 40px; }
        .btn-start { 
            background: var(--red); color: white; border: none; padding: 18px 60px; 
            font-weight: 900; border-radius: 50px; cursor: pointer; text-transform: uppercase; 
            box-shadow: 0 0 30px rgba(198,28,35,0.4); font-size: 14px; transition: 0.3s;
        }
        @keyframes pulseLogo { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); filter: drop-shadow(0 0 25px var(--red)); } }

        /* --- HEADER & NAV --- */
        header { height: 65px; background: #080808; border-bottom: 2px solid var(--red); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: relative; z-index: 2000; }
        .burger { font-size: 30px; color: var(--red); cursor: pointer; }
        .nav { position: absolute; top: 65px; right: 0; background: #0a0a0a; width: 260px; display: none; flex-direction: column; border-left: 2px solid var(--red); z-index: 1900; height: calc(100vh - 65px); }
        .nav button { background: none; border: none; color: white; padding: 20px; text-align: left; border-bottom: 1px solid #1a1a1a; font-weight: 900; text-transform: uppercase; font-size: 13px; }

        .container { height: calc(100vh - 65px); overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .page { display: none; } .active { display: block; }

        /* --- CAMPO --- */
        #pitch-box { 
            width: 100%; height: 460px; background: var(--grass); border: 2px solid #fff; border-radius: 4px; 
            position: relative; overflow: hidden; touch-action: none;
            background-image: repeating-linear-gradient(0deg, var(--grass), var(--grass) 40px, var(--grass-dark) 40px, var(--grass-dark) 80px);
        }
        .line-center { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: #fff; }
        .circle-center { position: absolute; top: 50%; left: 50%; width: 80px; height: 80px; border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); }
        .area-large { position: absolute; left: 50%; transform: translateX(-50%); width: 180px; height: 65px; border: 2px solid #fff; }
        .area-top { top: 0; border-top: none; } .area-bot { bottom: 0; border-bottom: none; }

        /* --- CARDS & STATS --- */
        .card { background: var(--card); border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--red); position: relative; }
        .market-val { float: right; color: #4caf50; font-weight: 900; font-size: 18px; }
        .badge-premium { position: absolute; top: -10px; right: 10px; background: var(--gold); color: #000; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 900; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 12px; text-align: center; background: #1a1a1a; padding: 8px; border-radius: 5px; }
        .comment-box { background: #080808; padding: 8px; border-radius: 4px; margin-top: 8px; font-size: 12px; border-left: 2px solid #444; }

        .btn-p { background: var(--red); color: white; border: none; padding: 14px; border-radius: 6px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        input, textarea { width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #333; color: #fff; margin-bottom: 10px; border-radius: 5px; box-sizing: border-box; }

        /* --- DRAG TOKENS --- */
        .player-token { position: absolute; width: 55px; text-align: center; z-index: 100; }
        .shirt { width: 40px; height: 40px; background: #000; border: 2px solid var(--red); border-radius: 50%; color: #fff; font-weight: 900; display: flex; align-items: center; justify-content: center; margin: 0 auto; box-shadow: 0 4px 8px rgba(0,0,0,0.6); }
        .p-tag { background: rgba(0,0,0,0.8); color: #fff; font-size: 9px; padding: 2px 4px; border-radius: 3px; margin-top: 3px; display: inline-block; font-weight: bold; }
    </style>
</head>
<body>

    <div id="intro">
        <div class="logo-box"></div>
        <div class="welcome-msg">MILANAC</div>
        <div class="sub-msg">PRO CLUB</div>
        <button class="btn-start" onclick="enterApp()">ENTRA NEL CLUB</button>
    </div>

    <header>
        <div style="color: var(--red); font-weight: 900; font-size: 24px;">MILANAC</div>
        <div class="burger" onclick="toggleNav()">☰</div>
        <nav id="nav" class="nav">
            <button onclick="showPage('home')">SQUADRA</button>
            <button onclick="showPage('lavagna')">LAVAGNA</button>
            <button onclick="showPage('stats')">RANKING & MERCATO</button>
            <button onclick="showPage('news')">NOTIZIE</button>
            <button onclick="showPage('admin')">ADMIN</button>
        </nav>
    </header>

    <div class="container">
        <div id="page-home" class="page active">
            <h1 style="text-align:center; color:var(--red);">LA ROSA</h1>
            <div id="lista-giocatori"></div>
        </div>

        <div id="page-lavagna" class="page">
            <h1 style="text-align:center; color:var(--red);">LAVAGNA TATTICA</h1>
            <div id="pitch-box">
                <div class="area-large area-top"></div>
                <div class="line-center"></div>
                <div class="circle-center"></div>
                <div class="area-large area-bot"></div>
                <div id="players-on-pitch"></div>
            </div>
        </div>

        <div id="page-stats" class="page">
            <h1 style="text-align:center; color:var(--red);">MERCATO</h1>
            <div id="ranking-list"></div>
        </div>

        <div id="page-news" class="page">
            <h1 style="text-align:center; color:var(--red);">NEWS & FEED</h1>
            <div id="lista-news"></div>
        </div>

        <div id="page-admin" class="page">
            <h1 style="text-align:center; color:var(--red);">GESTIONE</h1>
            <input type="password" id="adm-pass" placeholder="Password">
            <button class="btn-p" onclick="login()">ACCEDI</button>
            <div id="adm-box" style="display:none; margin-top:20px;">
                <div class="card">
                    <input type="text" id="g-n" placeholder="Nome">
                    <input type="number" id="g-num" placeholder="Numero">
                    <button class="btn-p" onclick="addG()">AGGIUNGI PLAYER</button>
                </div>
                <div class="card">
                    <input type="text" id="n-t" placeholder="Titolo News">
                    <textarea id="n-c" placeholder="Contenuto notizia..."></textarea>
                    <button class="btn-p" onclick="addN()">PUBBLICA NEWS</button>
                </div>
                <div id="adm-list-giocatori"></div>
            </div>
        </div>
    </div>

    <script>
        let db = { ps: [], ns: [] };

        function load() {
            const saved = localStorage.getItem('milanac_v56');
            if(saved) db = JSON.parse(saved);
        }

        function enterApp() {
            const intro = document.getElementById('intro');
            intro.style.opacity = '0';
            intro.style.transform = 'scale(1.1)';
            setTimeout(() => {
                intro.style.display = 'none';
                render();
            }, 800);
        }

        function calculateMarket(p) {
            let val = 10 + (p.g * 5) + (p.a * 3) + (p.p * 1);
            if(p.v && p.v.length > 0) {
                let media = p.v.reduce((a,b)=>a+b,0) / p.v.length;
                val = val * (media / 6);
            }
            return val.toFixed(1);
        }

        function toggleNav() { const m = document.getElementById('nav'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function showPage(p) { document.querySelectorAll('.page').forEach(x => x.classList.remove('active')); document.getElementById('page-'+p).classList.add('active'); document.getElementById('nav').style.display='none'; render(); }
        function login() { if(document.getElementById('adm-pass').value === 'milan') document.getElementById('adm-box').style.display='block'; }
        function save() { localStorage.setItem('milanac_v56', JSON.stringify(db)); render(); }

        function addG() { const n = document.getElementById('g-n').value, num = document.getElementById('g-num').value; if(n && num) { db.ps.push({id:Date.now(), n, num, g:0, a:0, p:0, v:[], in:false}); save(); } }
        function addN() { const t = document.getElementById('n-t').value, c = document.getElementById('n-c').value; if(t && c) { db.ns.unshift({id:Date.now(), t, c, d:new Date().toLocaleDateString(), comments:[]}); save(); } }

        function addComment(newsId) {
            let user = prompt("Tuo Nome:"); let text = prompt("Commento:");
            if(user && text) { let news = db.ns.find(n => n.id === newsId); if(!news.comments) news.comments = []; news.comments.push({user, text}); save(); }
        }

        function render() {
            // SQUADRA
            document.getElementById('lista-giocatori').innerHTML = db.ps.map(p => `
                <div class="card">
                    <span class="market-val">€${calculateMarket(p)}M</span>
                    <b>#${p.num} ${p.n.toUpperCase()}</b>
                    <div class="stats-grid">
                        <div><small>P</small><br><b>${p.p}</b></div>
                        <div><small>G</small><br><b>${p.g}</b></div>
                        <div><small>A</small><br><b>${p.a}</b></div>
                        <div><small>MV</small><br><b>${p.v.length?(p.v.reduce((a,b)=>a+b,0)/p.v.length).toFixed(1):'-'}</b></div>
                    </div>
                    <button class="btn-p" onclick="db.ps.find(x=>x.id===${p.id}).in=!db.ps.find(x=>x.id===${p.id}).in; save();" 
                    style="background:${p.in?'var(--red)':'#222'}">${p.in?'CONVOCATO':'ASSENTE'}</button>
                </div>`).join('');

            // RANKING
            let sortedVal = [...db.ps].sort((a,b)=> calculateMarket(b) - calculateMarket(a));
            document.getElementById('ranking-list').innerHTML = sortedVal.map((p, i) => `
                <div class="card">
                    ${i===0 && calculateMarket(p)>10 ? '<div class="badge-premium">💎 MVP</div>':''}
                    <div style="display:flex; justify-content:space-between;">
                        <span><b>${i+1}.</b> ${p.n}</span>
                        <b style="color:#4caf50;">€${calculateMarket(p)}M</b>
                    </div>
                </div>`).join('');

            // NEWS
            document.getElementById('lista-news').innerHTML = db.ns.map(n => `
                <div class="card">
                    <small>${n.d}</small><h3 style="margin:5px 0;">${n.t.toUpperCase()}</h3>
                    <p style="font-size:14px; color:#ccc;">${n.c}</p>
                    <button onclick="addComment(${n.id})" style="background:#333; color:white; border:none; padding:8px; border-radius:4px; font-size:11px; width:100%; cursor:pointer;">💬 COMMENTA</button>
                    ${(n.comments || []).map(c => `<div class="comment-box"><b>${c.user}:</b> ${c.text}</div>`).join('')}
                </div>`).join('');

            // LAVAGNA
            const pitch = document.getElementById('players-on-pitch'); pitch.innerHTML = '';
            db.ps.filter(p => p.in).forEach((p, i) => {
                const tok = document.createElement('div');
                tok.className = 'player-token';
                tok.innerHTML = `<div class="shirt">${p.num}</div><div class="p-tag">${p.n.split(' ')[0]}</div>`;
                tok.style.left = '20px'; tok.style.top = (i * 45 + 30) + 'px';
                pitch.appendChild(tok);
                tok.addEventListener('touchmove', e => {
                    e.preventDefault(); let t = e.touches[0]; let r = document.getElementById('pitch-box').getBoundingClientRect();
                    tok.style.left = (t.pageX - r.left - 27) + 'px'; tok.style.top = (t.pageY - r.top - 20) + 'px';
                }, {passive: false});
            });

            // ADMIN LIST
            document.getElementById('adm-list-giocatori').innerHTML = db.ps.map(p => `
                <div class="card">
                    <b>${p.n} (#${p.num})</b>
                    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin:10px 0;">
                        <input type="number" onchange="db.ps.find(x=>x.id===${p.id}).p=parseInt(this.value);save()" value="${p.p}" placeholder="P">
                        <input type="number" onchange="db.ps.find(x=>x.id===${p.id}).g=parseInt(this.value);save()" value="${p.g}" placeholder="G">
                        <input type="number" onchange="db.ps.find(x=>x.id===${p.id}).a=parseInt(this.value);save()" value="${p.a}" placeholder="A">
                    </div>
                    <button onclick="let v=prompt('Voto:'); if(v){db.ps.find(x=>x.id===${p.id}).v.push(parseFloat(v.replace(',','.')));save();}" class="btn-p" style="background:var(--gold); color:black;">VOTO PARTITA</button>
                    <button onclick="if(confirm('Eliminare?')){db.ps=db.ps.filter(x=>x.id!==${p.id});save()}" style="color:red; background:none; border:none; margin-top:10px; font-size:10px; width:100%;">ELIMINA PLAYER</button>
                </div>`).join('');
        }
        load();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC FC26</title>
    <style>
        :root { --neon: #ff0000; --bg: #000; --gold: #e2bc4a; --gold-dark: #b8860b; }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'DIN Condensed', 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* NAVIGAZIONE */
        #app-content { display: flex; height: 100vh; flex-direction: column; }
        .nav { display: flex; background: #111; border-top: 2px solid var(--gold); height: 70px; order: 2; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #666; font-weight: bold; }
        .nav-item.active { color: var(--gold); background: #1a1a1a; box-shadow: inset 0 3px 0 var(--gold); }

        .main { flex: 1; overflow-y: auto; padding: 15px; order: 1; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
        .page { display: none; }
        .page.active { display: block; }

        /* SCHEDA FC26 ULTIMATE TEAM */
        .fc26-card {
            width: 260px; height: 380px; margin: 20px auto;
            background: linear-gradient(135deg, #f9e196 0%, #e2bc4a 35%, #b8860b 100%);
            clip-path: polygon(10% 0, 90% 0, 100% 15%, 100% 85%, 50% 100%, 0 85%, 0 15%);
            position: relative; color: #222; border: 2px solid #5d4a1b;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), 0 0 20px rgba(226, 188, 74, 0.3);
        }
        .card-inner { position: absolute; top: 5px; left: 5px; right: 5px; bottom: 5px; background: inherit; border: 1px solid rgba(255,255,255,0.3); clip-path: inherit; }
        
        .rating-box { position: absolute; top: 40px; left: 25px; line-height: 1; text-align: center; }
        .overall { font-size: 45px; font-weight: 900; display: block; }
        .pos { font-size: 18px; font-weight: bold; text-transform: uppercase; }

        .player-img { width: 140px; height: 140px; margin: 30px auto 0; display: block; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }
        .player-name { font-size: 24px; font-weight: 900; text-align: center; text-transform: uppercase; margin: 10px 0; border-bottom: 2px solid rgba(0,0,0,0.1); width: 80%; margin-left: 10%; }

        .fc-stats { display: grid; grid-template-columns: 1fr 1fr; width: 80%; margin: 0 auto; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 10px; }
        .fc-stat-item { text-align: center; font-size: 14px; padding: 2px 0; }
        .fc-stat-val { font-weight: 900; font-size: 18px; margin-right: 5px; }
        .fc-stat-lbl { font-weight: bold; color: #444; text-transform: uppercase; font-size: 12px; }

        /* UI GENERALE */
        .card { background: #151515; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        h1 { color: var(--gold); text-align: center; text-transform: uppercase; font-size: 1.8rem; letter-spacing: 2px; }
        button { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 5px; font-weight: bold; text-transform: uppercase; width: 100%; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="app-content">
        <div class="nav">
            <div class="nav-item active" onclick="tab('h', this)">PITCH</div>
            <div class="nav-item" onclick="tab('p', this)">MY CARD</div>
            <div class="nav-item" onclick="tab('s', this)">STATS</div>
            <div class="nav-item" onclick="tab('a', this)">ADMIN</div>
        </div>

        <div class="main">
            <div id="pg-h" class="page active">
                <h1>LINEUP</h1>
                <div id="list-appello"></div>
            </div>

            <div id="pg-p" class="page">
                <div class="fc26-card">
                    <div class="card-inner">
                        <div class="rating-box">
                            <span class="overall" id="fc-ovr">88</span>
                            <span class="pos" id="fc-pos">ATT</span>
                        </div>
                        <img src="https://cdn-icons-png.flaticon.com/512/1165/1165187.png" class="player-img">
                        <div class="player-name" id="fc-name">ROSSI</div>
                        <div class="fc-stats">
                            <div class="fc-stat-item"><span class="fc-stat-val" id="fc-gol">12</span><span class="fc-stat-lbl">GOL</span></div>
                            <div class="fc-stat-item"><span class="fc-stat-val" id="fc-match">25</span><span class="fc-stat-lbl">MATCH</span></div>
                            <div class="fc-stat-item"><span class="fc-stat-val" id="fc-mvp">3</span><span class="fc-stat-lbl">MVP</span></div>
                            <div class="fc-stat-item"><span class="fc-stat-val">99</span><span class="fc-stat-lbl">MIL</span></div>
                        </div>
                    </div>
                </div>
                <button onclick="setMe()">SELECT PLAYER</button>
            </div>

            <div id="pg-s" class="page">
                <h1>CLUB STATS</h1>
                <div class="card"><h3>POTM</h3><h2 id="club-potm" style="color:var(--gold); text-align:center;">---</h2></div>
                <div class="card"><h3>CLUB GOALS</h3><h1 id="club-gol" style="text-align:center;">0</h1></div>
            </div>

            <div id="pg-a" class="page">
                <h1>ADMIN</h1>
                <div class="card"><input type="password" id="pw" placeholder="Pass (milan)"><button onclick="auth()">ENTRA</button></div>
                <div id="adm-ui" style="display:none">
                    <div class="card">
                        <input type="text" id="new-n" placeholder="Nome">
                        <select id="new-r" style="width:100%; padding:10px; background:#222; color:white;"><option>ATT</option><option>CC</option><option>DIF</option><option>POR</option></select>
                        <button onclick="add()">AGGIUNGI</button>
                    </div>
                    <div id="list-adm"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('milanac_fc26') || '{"players":[], "potm":"---", "gol":0}');

        function tab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('pg-'+id).classList.add('active');
            el.classList.add('active');
            render();
        }

        function auth() { if(document.getElementById('pw').value === "milan") document.getElementById('adm-ui').style.display='block'; }
        
        function setMe() {
            let n = prompt("Nome Giocatore:");
            let p = db.players.find(x => x.n.toLowerCase() === n.toLowerCase());
            if(p) { localStorage.setItem('my_id', p.id); render(); }
        }

        function add() {
            const n = document.getElementById('new-n').value;
            if(n) db.players.push({id: Date.now(), n, r: document.getElementById('new-r').value, in: false, goals: 0, matches: 0, mvp: 0});
            save();
        }

        function toggle(id) { 
            const p = db.players.find(x => x.id === id); p.in = !p.in; 
            if(p.in) p.matches++; save(); 
        }

        function save() { localStorage.setItem('milanac_fc26', JSON.stringify(db)); render(); }

        function render() {
            const me = db.players.find(x => x.id == localStorage.getItem('my_id'));
            if(me) {
                document.getElementById('fc-name').innerText = me.n;
                document.getElementById('fc-pos').innerText = me.r;
                document.getElementById('fc-gol').innerText = me.goals;
                document.getElementById('fc-match').innerText = me.matches;
                document.getElementById('fc-mvp').innerText = me.mvp;
                // Calcolo rating simulato
                document.getElementById('fc-ovr').innerText = Math.min(99, 75 + (me.goals * 2) + me.mvp);
            }

            document.getElementById('list-appello').innerHTML = db.players.map(p => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <span><b>${p.n.toUpperCase()}</b></span>
                    <button onclick="toggle(${p.id})" style="width:auto; padding:8px 15px; margin:0; background:${p.in?'#ff0000':'#333'}; color:white;">${p.in?'IN':'OUT'}</button>
                </div>
            `).join('');

            document.getElementById('club-potm').innerText = db.potm;
            document.getElementById('club-gol').innerText = db.gol;
        }
        window.onload = render;
    </script>
</body>
</html>

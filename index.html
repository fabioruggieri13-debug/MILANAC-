<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC PRO</title>
    <style>
        :root { --neon: #ff0000; --bg: #000; --card: #111; --text: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        
        /* Navigazione Superiore - Impossibile da mancare */
        .nav-top { display: flex; background: #1a1a1a; height: 60px; border-bottom: 2px solid var(--neon); overflow-x: auto; white-space: nowrap; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0 15px; font-size: 11px; font-weight: bold; color: #777; transition: 0.3s; }
        .nav-item.active { color: var(--neon); background: #222; box-shadow: inset 0 -3px 0 var(--neon); }

        .container { height: calc(100vh - 60px); overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .page { display: none; }
        .page.active { display: block; }

        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; }
        h1 { color: var(--neon); text-align: center; font-size: 1.4rem; text-transform: uppercase; margin: 10px 0; }
        button { background: var(--neon); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; margin: 5px 0; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; }

        .row { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 5px; border-left: 4px solid #333; }
        .row.in { border-left-color: var(--neon); background: #2a1111; }
    </style>
</head>
<body>

    <div class="nav-top">
        <div class="nav-item active" onclick="show('home', this)">HOME</div>
        <div class="nav-item" onclick="show('stats', this)">STATS</div>
        <div class="nav-item" onclick="show('albo', this)">ALBO</div>
        <div class="nav-item" onclick="show('admin', this)">ADMIN ⚙️</div>
    </div>

    <div class="container">
        <div id="p-home" class="page active">
            <h1>PRESENZE</h1>
            <div id="l-home"></div>
        </div>

        <div id="p-stats" class="page">
            <h1>STATISTICHE</h1>
            <div class="card">
                <h3 style="color:var(--neon); margin:0">PLAYER OF THE MONTH</h3>
                <div id="potm-display" style="font-size: 24px; text-align:center; padding:15px; font-weight:bold;">---</div>
            </div>
            <div class="card">
                <h3>DATI SESSIONE</h3>
                <div id="dati-display"></div>
            </div>
        </div>

        <div id="p-albo" class="page">
            <h1>ALBO D'ORO</h1>
            <div id="l-albo"></div>
        </div>

        <div id="p-admin" class="page">
            <h1>AREA ADMIN</h1>
            <div id="admin-auth">
                <input type="password" id="pw" placeholder="Password Admin">
                <button onclick="auth()">ENTRA</button>
            </div>
            <div id="admin-ctrl" style="display:none">
                <div class="card">
                    <h3>AGGIUNGI GIOCATORE</h3>
                    <input type="text" id="add-n" placeholder="Nome">
                    <select id="add-r"><option>ATT</option><option>CC</option><option>DIF</option><option>POR</option></select>
                    <button onclick="add()">AGGIUNGI</button>
                </div>
                <div class="card">
                    <h3>SET POTM & STATS</h3>
                    <input type="text" id="set-p" placeholder="Nome POTM">
                    <input type="number" id="set-g" placeholder="Gol Totali">
                    <button onclick="setGlobal()">SALVA DATI</button>
                </div>
                <div id="l-admin"></div>
            </div>
        </div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('milanac_pro_db') || '{"players":[], "potm":"Nessuno", "gol":0, "albo":[]}');

        function show(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-'+id).classList.add('active');
            el.classList.add('active');
            render();
        }

        function auth() {
            if(document.getElementById('pw').value === "milan") {
                document.getElementById('admin-auth').style.display = 'none';
                document.getElementById('admin-ctrl').style.display = 'block';
                render();
            }
        }

        function add() {
            const n = document.getElementById('add-n').value;
            if(!n) return;
            data.players.push({ id: Date.now(), n, r: document.getElementById('add-r').value, in: false });
            save();
        }

        function setGlobal() {
            data.potm = document.getElementById('set-p').value || data.potm;
            data.gol = document.getElementById('set-g').value || data.gol;
            save();
        }

        function toggle(id) {
            const p = data.players.find(x => x.id === id);
            p.in = !p.in;
            save();
        }

        function del(id) {
            data.players = data.players.filter(p => p.id !== id);
            save();
        }

        function save() {
            localStorage.setItem('milanac_pro_db', JSON.stringify(data));
            render();
        }

        function render() {
            // Home
            document.getElementById('l-home').innerHTML = data.players.map(p => `
                <div class="row ${p.in?'in':''}">
                    <span><b>${p.n}</b> (${p.r})</span>
                    <button style="width:auto; padding:5px 15px; background:${p.in?'var(--neon)':'#333'}" onclick="toggle(${p.id})">${p.in?'IN':'OUT'}</button>
                </div>
            `).join('') || "Rosa vuota. Aggiungi player in ADMIN.";

            // Stats
            document.getElementById('potm-display').innerText = "🏆 " + data.potm;
            document.getElementById('dati-display').innerHTML = `<p>Gol Totali Club: <b>${data.gol}</b></p>`;

            // Admin
            document.getElementById('l-admin').innerHTML = data.players.map(p => `
                <div class="row"><span>${p.n}</span><button onclick="del(${p.id})" style="width:auto; background:#444">ELIMINA</button></div>
            `).join('');
        }
        window.onload = render;
    </script>
</body>
</html>

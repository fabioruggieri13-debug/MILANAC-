<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC PROCLUB - DEFINITIVO</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --rosso: #C61C23; --nero: #000; --scuro: #121212; --oro: #D4AF37; --erba: #2e7d32; --erba-scura: #1b5e20; }
        body, html { margin: 0; padding: 0; background: var(--nero); color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }
        
        /* Intro Personalizzata */
        #intro { position: fixed; inset: 0; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; text-align: center; padding: 20px; }
        .titolo-milanac { font-size: 3rem; font-weight: 900; color: var(--oro); margin-bottom: 10px; text-transform: uppercase; letter-spacing: -1px; }
        .welcome-text { font-size: 1.2rem; color: #fff; margin-bottom: 30px; font-weight: 300; }

        header { height: 65px; background: #080808; border-bottom: 2px solid var(--rosso); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: relative; z-index: 2000; }
        .burger { font-size: 30px; color: var(--rosso); cursor: pointer; }
        .nav-laterale { position: absolute; top: 65px; right: 0; background: #0a0a0a; width: 260px; display: none; flex-direction: column; border-left: 2px solid var(--rosso); height: calc(100vh - 65px); z-index: 1900; }
        .nav-laterale button { background: none; border: none; color: white; padding: 18px; text-align: left; border-bottom: 1px solid #1a1a1a; font-weight: bold; text-transform: uppercase; font-size: 11px; }

        .area-principale { height: calc(100vh - 65px); overflow-y: auto; padding: 10px; box-sizing: border-box; }
        .pagina { display: none; } .attiva { display: block; }

        /* Moduli Tattici */
        .selettore-moduli { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 10px; }
        .btn-modulo { background: #1a1a1a; border: 1px solid var(--oro); color: var(--oro); padding: 8px 2px; font-size: 10px; font-weight: bold; border-radius: 4px; }
        .btn-modulo.active { background: var(--oro); color: black; }

        /* Lavagna Tattica */
        #pitch { width: 92vw; height: 125vw; max-height: 500px; background: var(--erba); border: 3px solid #fff; border-radius: 5px; position: relative; margin: 0 auto; background-image: repeating-linear-gradient(0deg, var(--erba), var(--erba) 45px, var(--erba-scura) 45px, var(--erba-scura) 90px); }
        .pedina { position: absolute; width: 50px; text-align: center; transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1); z-index: 100; }
        .maglia { width: 40px; height: 40px; background: #000; border: 2px solid var(--rosso); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; margin: 0 auto; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .nome-p { background: rgba(0,0,0,0.85); font-size: 9px; padding: 2px 5px; border-radius: 3px; margin-top: 3px; display: inline-block; font-weight: bold; }

        .scheda { background: var(--scuro); border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 5px solid var(--rosso); }
        .btn-milanac { background: linear-gradient(to bottom, var(--rosso), #8b0000); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 0 #5a0000; }
        input, select { width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #333; color: white; margin-bottom: 10px; border-radius: 6px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="intro">
        <h1 class="titolo-milanac">MILANAC PROCLUB</h1>
        <p class="welcome-text">Benvenuto rossonero, entra nel club!</p>
        <button class="btn-milanac" style="width:auto; padding: 15px 60px;" onclick="document.getElementById('intro').style.display='none'">ENTRA</button>
    </div>

    <header>
        <div style="font-weight:900; color:var(--rosso); font-size:22px;">MILANAC</div>
        <div class="burger" onclick="toggleNav()">☰</div>
        <nav id="nav" class="nav-laterale">
            <button onclick="vai('rosa')">La Squadra</button>
            <button onclick="vai('tattica')">Lavagna Tattica</button>
            <button onclick="vai('admin')">Admin Area</button>
        </nav>
    </header>

    <div class="area-principale">
        <div id="p-rosa" class="pagina attiva"><h2 style="text-align:center">LA ROSA</h2><div id="lista-rosa"></div></div>
        
        <div id="p-tattica" class="pagina">
            <h2 style="text-align:center; margin: 5px 0;">FORMAZIONE</h2>
            <div class="selettore-moduli">
                <button class="btn-modulo" onclick="applicaModulo('4-4-2', this)">4-4-2</button>
                <button class="btn-modulo" onclick="applicaModulo('4-3-3', this)">4-3-3</button>
                <button class="btn-modulo" onclick="applicaModulo('3-5-2', this)">3-5-2</button>
                <button class="btn-modulo" onclick="applicaModulo('3-4-1-2', this)">3-4-1-2</button>
            </div>
            <div id="pitch">
                <div style="position:absolute; top:50%; width:100%; height:2px; background:#fff; opacity:0.3;"></div>
                <div id="pedine-campo"></div>
            </div>
        </div>

        <div id="p-admin" class="pagina">
            <h2 style="text-align:center">GESTIONE</h2>
            <input type="password" id="pass-admin" placeholder="Password">
            <button class="btn-milanac" onclick="if(document.getElementById('pass-admin').value==='milan') document.getElementById('box-adm').style.display='block'">ACCEDI</button>
            <div id="box-adm" style="display:none; margin-top:20px;">
                <input type="text" id="n-nome" placeholder="Nome">
                <input type="number" id="n-maglia" placeholder="Numero">
                <select id="n-ruolo"><option value="DIF">DIF</option><option value="CEN">CEN</option><option value="ATT">ATT</option></select>
                <button class="btn-milanac" onclick="addP()">AGGIUNGI</button>
                <div id="adm-list" style="margin-top:20px;"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDbO_AxHKz1avQpYscoSSLpEfmFaL8MRGg",
            authDomain: "milanac-proclub.firebaseapp.com",
            projectId: "milanac-proclub",
            storageBucket: "milanac-proclub.firebasestorage.app",
            messagingSenderId: "61702234008",
            appId: "1:61702234008:web:aa597d8600d0a8251895ed"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let clubData = { ps: [], mod: '4-4-2' };

        db.collection("milanac").doc("dati").onSnapshot(doc => {
            if(doc.exists) { clubData = doc.data(); render(); }
        });

        function sync() { db.collection("milanac").doc("dati").set(clubData); }
        function toggleNav() { const n = document.getElementById('nav'); n.style.display = (n.style.display==='flex')?'none':'flex'; }
        function vai(p) { document.querySelectorAll('.pagina').forEach(x=>x.classList.remove('attiva')); document.getElementById('p-'+p).classList.add('attiva'); toggleNav(); }

        function addP() {
            const n = document.getElementById('n-nome').value, m = document.getElementById('n-maglia').value, r = document.getElementById('n-ruolo').value;
            if(n && m) {
                clubData.ps.push({id: Date.now(), n, m, r, convocato:false, g:0, potm:0});
                sync();
            }
        }

        const schemi = {
            '4-4-2': [{x:50,y:85},{x:20,y:70},{x:40,y:70},{x:60,y:70},{x:80,y:70},{x:20,y:45},{x:40,y:45},{x:60,y:45},{x:80,y:45},{x:40,y:20},{x:60,y:20}],
            '4-3-3': [{x:50,y:85},{x:20,y:70},{x:40,y:70},{x:60,y:70},{x:80,y:70},{x:30,y:45},{x:50,y:45},{x:70,y:45},{x:20,y:20},{x:50,y:15},{x:80,y:20}],
            '3-5-2': [{x:50,y:85},{x:30,y:70},{x:50,y:70},{x:70,y:70},{x:15,y:45},{x:35,y:45},{x:50,y:45},{x:65,y:45},{x:85,y:45},{x:40,y:20},{x:60,y:20}],
            '3-4-1-2': [{x:50,y:85},{x:30,y:70},{x:50,y:70},{x:70,y:70},{x:20,y:45},{x:40,y:45},{x:60,y:45},{x:80,y:45},{x:50,y:30},{x:40,y:15},{x:60,y:15}]
        };

        function applicaModulo(m, btn) {
            clubData.mod = m;
            document.querySelectorAll('.btn-modulo').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            sync();
        }

        function render() {
            let hRosa = "";
            clubData.ps.forEach(p => {
                hRosa += `<div class="scheda" style="border-left-color:${p.convocato?'#4caf50':'var(--rosso)'}">
                    <b>#${p.m} ${p.n.toUpperCase()}</b>
                    <button class="btn-milanac" style="width:auto; float:right; padding:5px 10px; font-size:10px; background:${p.convocato?'#4caf50':'#333'}" onclick="const idx=clubData.ps.findIndex(x=>x.id===${p.id}); clubData.ps[idx].convocato=!clubData.ps[idx].convocato; sync();">
                        ${p.convocato?'CONVOCATO':'NON CONVOCATO'}
                    </button>
                </div>`;
            });
            document.getElementById('lista-rosa').innerHTML = hRosa;

            const campo = document.getElementById('pedine-campo'); campo.innerHTML = "";
            const convocati = clubData.ps.filter(p => p.convocato);
            const pos = schemi[clubData.mod || '4-4-2'];

            convocati.forEach((p, i) => {
                if(i < 11) {
                    const div = document.createElement('div'); div.className = 'pedina';
                    div.style.left = `calc(${pos[i].x}% - 25px)`; div.style.top = `calc(${pos[i].y}% - 25px)`;
                    div.innerHTML = `<div class="maglia">${p.m}</div><div class="nome-p">${p.n}</div>`;
                    campo.appendChild(div);
                }
            });

            document.getElementById('adm-list').innerHTML = clubData.ps.map(p => `
                <div class="scheda">
                    <span>#${p.m} ${p.n}</span>
                    <button onclick="if(confirm('Elimina?')){clubData.ps=clubData.ps.filter(x=>x.id!==${p.id});sync()}" style="float:right; color:red; background:none; border:none; font-weight:bold;">X</button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>

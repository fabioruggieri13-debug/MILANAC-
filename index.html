<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC PRO CLUB V80 - CLOUD</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --rosso: #C61C23; --nero: #000; --oro: #D4AF37; --erba: #2e7d32; --erba-scura: #1b5e20; }
        body { margin: 0; background: var(--nero); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* Intro Pulsante Richiesta */
        #intro { 
            position: fixed; inset: 0; background: radial-gradient(circle, #200 0%, #000 100%); z-index: 10000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            animation: pulseBg 2s infinite alternate;
        }
        @keyframes pulseBg { from { opacity: 0.9; } to { opacity: 1; transform: scale(1.01); } }
        
        header { height: 60px; border-bottom: 2px solid var(--rosso); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: #080808; position: sticky; top: 0; z-index: 2000; }
        .burger { font-size: 30px; color: var(--rosso); cursor: pointer; }
        
        .nav-menu { position: fixed; top: 60px; right: -100%; width: 260px; height: 100%; background: #0a0a0a; transition: 0.3s; z-index: 1900; border-left: 2px solid var(--rosso); }
        .nav-menu.active { right: 0; }
        .nav-menu button { width: 100%; padding: 18px; background: none; border: none; color: white; text-align: left; font-weight: bold; border-bottom: 1px solid #1a1a1a; text-transform: uppercase; font-size: 11px; }

        .pagina { display: none; padding: 15px; }
        .pagina.attiva { display: block; }

        /* IL CAMPO V80 */
        .moduli-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 10px; }
        .btn-mod { background: #111; border: 1px solid var(--oro); color: var(--oro); padding: 8px 2px; font-size: 10px; font-weight: bold; border-radius: 4px; }
        .btn-mod.active { background: var(--oro); color: black; }

        #pitch { 
            width: 100%; max-width: 400px; height: 500px; background: var(--erba); 
            margin: 0 auto; position: relative; border: 2px solid white; border-radius: 5px;
            background-image: repeating-linear-gradient(0deg, var(--erba), var(--erba) 45px, var(--erba-scura) 45px, var(--erba-scura) 90px);
        }
        .pedina { position: absolute; width: 50px; text-align: center; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 100; }
        .maglia { width: 40px; height: 40px; background: black; border: 2px solid var(--rosso); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; font-weight: 900; font-size: 14px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .nome-p { background: rgba(0,0,0,0.8); font-size: 9px; padding: 2px 4px; border-radius: 3px; margin-top: 2px; display: inline-block; font-weight: bold; }

        /* SCHEDE V80 */
        .scheda { background: #111; padding: 15px; margin-bottom: 10px; border-left: 5px solid var(--rosso); border-radius: 5px; position: relative; }
        .voto-box { position: absolute; right: 15px; top: 15px; color: var(--oro); font-weight: 900; font-size: 1.2rem; }
        .stats { font-size: 11px; color: #888; margin-top: 5px; }
        
        .btn-milan { width: 100%; padding: 15px; background: var(--rosso); color: white; border: none; font-weight: 900; border-radius: 5px; text-transform: uppercase; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; background: #0f0f0f; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="intro">
        <h1 style="color:var(--rosso); font-size: 3rem; margin: 0; font-weight: 900;">MILANAC</h1>
        <p style="letter-spacing: 2px;">V80 CLOUD SYSTEM</p>
        <button class="btn-milan" style="width: auto; padding: 15px 60px; border-radius: 30px;" onclick="document.getElementById('intro').style.display='none'">ENTRA</button>
    </div>

    <header>
        <div style="font-weight: 900; color: var(--rosso); font-size: 22px;">MILANAC V80</div>
        <div class="burger" onclick="document.querySelector('.nav-menu').classList.toggle('active')">☰</div>
    </header>

    <nav class="nav-menu">
        <button onclick="vai('rosa')">ROSA SQUADRA</button>
        <button onclick="vai('tattica')">LAVAGNA TATTICA</button>
        <button onclick="vai('mercato')">MERCATO</button>
        <button onclick="vai('premi')">BACHECA PREMI</button>
        <button onclick="vai('admin')">ADMIN</button>
    </nav>

    <div id="p-rosa" class="pagina attiva">
        <h2 style="text-align:center">LA ROSA</h2>
        <div id="lista-rosa"></div>
    </div>

    <div id="p-tattica" class="pagina">
        <div class="moduli-bar">
            <button class="btn-mod" onclick="applicaModulo('4-4-2')">4-4-2</button>
            <button class="btn-mod" onclick="applicaModulo('4-3-3')">4-3-3</button>
            <button class="btn-mod" onclick="applicaModulo('3-5-2')">3-5-2</button>
            <button class="btn-mod" onclick="applicaModulo('3-4-1-2')">3-4-1-2</button>
        </div>
        <div id="pitch"><div id="pedine-campo"></div></div>
    </div>

    <div id="p-mercato" class="pagina"><h2 style="text-align:center">VALORI</h2><div id="lista-mercato"></div></div>
    <div id="p-premi" class="pagina"><h2 style="text-align:center">PREMI</h2><div id="lista-premi"></div></div>

    <div id="p-admin" class="pagina">
        <div class="scheda">
            <h3>NUOVO GIOCATORE</h3>
            <input type="text" id="add-n" placeholder="Nome">
            <input type="number" id="add-m" placeholder="Numero">
            <select id="add-r"><option>POR</option><option>DIF</option><option>CEN</option><option>ATT</option></select>
            <button class="btn-milan" onclick="addP()">SALVA GIOCATORE</button>
        </div>
        <div id="lista-admin"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDbO_AxHKz1avQpYscoSSLpEfmFaL8MRGg",
            authDomain: "milanac-proclub.firebaseapp.com",
            projectId: "milanac-proclub",
            storageBucket: "milanac-proclub.firebasestorage.app",
            messagingSenderId: "61702234008",
            appId: "1:61702234008:web:aa597d8600d0a8251895ed"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let club = { ps: [], mod: '4-4-2' };

        // Caricamento Cloud
        db.collection("milanac").doc("v80").onSnapshot(doc => {
            if(doc.exists) { club = doc.data(); render(); }
        });

        function salva() { db.collection("milanac").doc("v80").set(club); }

        function vai(p) {
            document.querySelectorAll('.pagina').forEach(x => x.classList.remove('attiva'));
            document.getElementById('p-' + p).classList.add('attiva');
            document.querySelector('.nav-menu').classList.remove('active');
        }

        function addP() {
            const n = document.getElementById('add-n').value, m = document.getElementById('add-m').value, r = document.getElementById('add-r').value;
            if(n && m) {
                club.ps.push({ id: Date.now(), n, m, r, v: 6.0, g: 0, p: 0, c: false });
                salva();
            }
        }

        const schemi = {
            '4-4-2': [{x:50,y:85},{x:20,y:70},{x:40,y:70},{x:60,y:70},{x:80,y:70},{x:20,y:45},{x:40,y:45},{x:60,y:45},{x:80,y:45},{x:40,y:20},{x:60,y:20}],
            '4-3-3': [{x:50,y:85},{x:20,y:70},{x:40,y:70},{x:60,y:70},{x:80,y:70},{x:30,y:45},{x:50,y:45},{x:70,y:45},{x:20,y:20},{x:50,y:15},{x:80,y:20}],
            '3-5-2': [{x:50,y:85},{x:30,y:70},{x:50,y:70},{x:70,y:70},{x:15,y:45},{x:35,y:45},{x:50,y:45},{x:65,y:45},{x:85,y:45},{x:40,y:20},{x:60,y:20}],
            '3-4-1-2': [{x:50,y:85},{x:30,y:70},{x:50,y:70},{x:70,y:70},{x:20,y:45},{x:40,y:45},{x:60,y:45},{x:80,y:45},{x:50,y:30},{x:40,y:15},{x:60,y:15}]
        };

        function applicaModulo(m) { club.mod = m; salva(); }

        function render() {
            let hRosa = "", hMercato = "", hPremi = "";
            club.ps.forEach(p => {
                const valore = (10 + p.g*2 + p.p*5 + (p.v-6)*5).toFixed(1);
                hRosa += `<div class="scheda">
                    <div class="voto-box">${p.v}</div>
                    <b style="color:var(--rosso)">${p.n.toUpperCase()}</b> #${p.m}<br>
                    <div class="stats">GOL: ${p.g} | POTM: ${p.p} | ${p.r}</div>
                    <button class="btn-milan" style="padding:5px; font-size:10px; background:${p.c?'#4caf50':'#333'}; width:auto;" 
                    onclick="const i=club.ps.findIndex(x=>x.id==${p.id}); club.ps[i].c=!club.ps[i].c; salva()">
                        ${p.c ? 'SCHIERATO ✅' : 'SCHIERA'}
                    </button>
                </div>`;
                hMercato += `<div class="scheda"><b>#${p.m} ${p.n}</b> <span style="float:right; color:#4caf50">€${valore}M</span></div>`;
                if(p.p > 0) hPremi += `<div class="scheda"><b>${p.n}</b>: ${p.p}x POTM 🏆</div>`;
            });
            document.getElementById('lista-rosa').innerHTML = hRosa;
            document.getElementById('lista-mercato').innerHTML = hMercato;
            document.getElementById('lista-premi').innerHTML = hPremi || "<p style='text-align:center'>Nessun premio assegnato</p>";

            const campo = document.getElementById('pedine-campo'); campo.innerHTML = "";
            const convocati = club.ps.filter(p => p.c);
            const pos = schemi[club.mod || '4-4-2'];
            convocati.forEach((p, i) => {
                if(i < 11) {
                    const div = document.createElement('div'); div.className = 'pedina';
                    div.style.left = `calc(${pos[i].x}% - 25px)`; div.style.top = `calc(${pos[i].y}% - 25px)`;
                    div.innerHTML = `<div class="maglia">${p.m}</div><div class="nome-p">${p.n}</div>`;
                    campo.appendChild(div);
                }
            });

            document.getElementById('lista-admin').innerHTML = club.ps.map(p => `
                <div class="scheda">
                    <b>${p.n}</b>
                    <div style="margin-top:5px">
                        Voto: <input type="number" step="0.5" value="${p.v}" style="width:60px; display:inline" onchange="const i=club.ps.findIndex(x=>x.id==${p.id}); club.ps[i].v=parseFloat(this.value); salva()">
                        Gol: <button onclick="const i=club.ps.findIndex(x=>x.id==${p.id}); club.ps[i].g++; salva()">+G</button>
                        POTM: <button onclick="const i=club.ps.findIndex(x=>x.id==${p.id}); club.ps[i].p++; salva()">+P</button>
                        <button onclick="club.ps=club.ps.filter(x=>x.id!==${p.id}); salva()" style="float:right; color:red; border:none; background:none">ELIMINA</button>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>

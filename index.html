<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC V24</title>
    <style>
        :root { --milan-red: #C61C23; --bg: #000000; --field: #1b3d21; --gold: #D4AF37; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--milan-red); font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* INTRO */
        #intro { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .intro-btn { background: var(--milan-red); color: #fff; border: none; padding: 18px 30px; font-size: 1rem; font-weight: 900; border-radius: 4px; cursor: pointer; text-transform: uppercase; border: 1px solid #7a0000; }

        header { height: 60px; background: #0a0a0a; border-bottom: 2px solid var(--milan-red); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        header div { font-weight: 900; color: var(--milan-red); letter-spacing: 2px; font-size: 1.2rem; }
        .burger { font-size: 28px; cursor: pointer; color: var(--milan-red); }
        
        .dropdown { position: absolute; top: 60px; right: 0; background: #080808; width: 220px; display: none; flex-direction: column; border: 1px solid var(--milan-red); z-index: 5000; }
        .dropdown button { background: none; border: none; color: var(--milan-red); padding: 18px; text-align: left; border-bottom: 1px solid #1a1a1a; font-weight: bold; text-transform: uppercase; font-size: 13px; }

        .content { height: calc(100vh - 60px); overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .page { display: none; } .page.active { display: block; }

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC V43 - OFFICIAL</title>
    <style>
        :root { --red: #C61C23; --bg: #000; --card: #121212; --gold: #D4AF37; --grass: #2e7d32; }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        header { height: 60px; background: #080808; border-bottom: 2px solid var(--red); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; }
        .burger { font-size: 28px; color: var(--red); cursor: pointer; }
        .nav { position: absolute; top: 60px; right: 0; background: #0a0a0a; width: 250px; display: none; flex-direction: column; border-left: 2px solid var(--red); z-index: 9999; }
        .nav button { background: none; border: none; color: white; padding: 15px; text-align: left; border-bottom: 1px solid #1a1a1a; font-weight: 900; text-transform: uppercase; font-size: 13px; }

        .container { height: calc(100vh - 60px); overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .page { display: none; } .active { display: block; }

        /* CAMPO DA CALCIO OTTIMIZZATO PER SCHERMO INTERO */
        #pitch-wrapper { width: 100%; display: flex; justify-content: center; padding: 5px 0; }
        #pitch-box { 
            width: 100%; height: 440px; background-color: var(--grass); border: 2px solid #fff; border-radius: 4px; 
            position: relative; overflow: hidden; touch-action: none;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(0,0,0,0.03) 40px, rgba(0,0,0,0.03) 80px);
        }
        .line-center { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: #fff; }
        .circle-center { position: absolute; top: 50%; left: 50%; width: 70px; height: 70px; border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); }
        .box-top { position: absolute; top: 0; left: 50%; width: 140px; height: 50px; border: 2px solid #fff; border-top: none; transform: translateX(-50%); }
        .box-bot { position: absolute; bottom: 0; left: 50%; width: 140px; height: 50px; border: 2px solid #fff; border-bottom: none; transform: translateX(-50%); }
        .goal { position: absolute; left: 50%; width: 50px; height: 4px; background: #fff; transform: translateX(-50%); }
        .goal.top { top: 0; } .goal.bot { bottom: 0; }

        /* GIOCATORI */
        .player-token { position: absolute; text-align: center; z-index: 100; width: 55px; }
        .shirt { width: 38px; height: 38px; background: #000; border: 2px solid var(--red); border-radius: 50%; color: #fff; font-weight: 900; display: flex; align-items: center; justify-content: center; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.4); font-size: 15px; }
        .p-name { background: rgba(0,0,0,0.85); color: #fff; font-size: 9px; font-weight: bold; padding: 2px 4px; border-radius: 2px; margin-top: 2px; display: inline-block; white-space: nowrap; text-transform: uppercase; }

        /* CARDS & UI */
        .card { background: var(--card); border-radius: 8px; padding: 12px; margin-bottom: 12px; border-left: 4px solid var(--red); }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px; text-align: center; font-size: 13px; }
        .btn-p { background: var(--red); color: white; border: none; padding: 14px; border-radius: 4px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        input, textarea { width: 100%; padding: 10px; background: #0a0a0a; border: 1px solid #333; color: #fff; margin-bottom: 8px; border-radius: 4px; box-sizing: border-box; }
        h1 { font-weight: 900; color: var(--red); text-align: center; font-size: 1.3rem; text-transform: uppercase; margin-bottom: 15px; }
        .gold-text { color: var(--gold); font-weight: 900; }
    </style>
</head>
<body>

    <header>
        <div style="color: var(--red); font-weight: 900; font-size: 22px; letter-spacing: 1px;">MILANAC</div>
        <div class="burger" onclick="toggleNav()">☰</div>
        <div id="nav" class="nav">
            <button onclick="showPage('home')">SQUADRA</button>
            <button onclick="showPage('lavagna')">LAVAGNA</button>
            <button onclick="showPage('stats')">CLASSIFICHE</button>
            <button onclick="showPage('news')">NOTIZIE</button>
            <button onclick="showPage('admin')">ADMIN</button>
        </div>
    </header>

    <div class="container">
        <div id="page-home" class="page active">
            <h1>LA ROSA</h1>
            <div id="lista-giocatori"></div>
        </div>

        <div id="page-lavagna" class="page">
            <h1>SCHIERAMENTO</h1>
            <div id="pitch-wrapper">
                <div id="pitch-box">
                    <div class="goal top"></div>
                    <div class="box-top"></div>
                    <div class="line-center"></div>
                    <div class="circle-center"></div>
                    <div class="box-bot"></div>
                    <div class="goal bot"></div>
                    <div id="players-on-pitch"></div>
                </div>
            </div>
            <p style="text-align:center; font-size:11px; color:#555;">Trascina i numeri per posizionare i giocatori</p>
        </div>

        <div id="page-stats" class="page">
            <h1>PUNTI (G+A)</h1>
            <div id="ranking-list"></div>
            <h1 style="margin-top:30px;">ALBO D'ORO</h1>
            <div id="albo-list"></div>
        </div>

        <div id="page-news" class="page">
            <h1>COMUNICATI UFFICIALI</h1>
            <div id="lista-news"></div>
        </div>

        <div id="page-admin" class="page">
            <h1>PANNELLO ADMIN</h1>
            <input type="password" id="adm-pass" placeholder="Password Admin">
            <button class="btn-p" onclick="login()">ACCEDI AI SISTEMI</button>
            <div id="adm-box" style="display:none; margin-top:20px;">
                <div class="card">
                    <h3>NUOVO GIOCATORE</h3>
                    <input type="text" id="g-n" placeholder="Nome Cognome">
                    <input type="number" id="g-num" placeholder="Numero Maglia">
                    <button class="btn-p" onclick="addG()">REGISTRA GIOCATORE</button>
                </div>
                <div class="card">
                    <h3>PUBBLICA NOTIZIA</h3>
                    <input type="text" id="n-t" placeholder="Titolo Comunicato">
                    <textarea id="n-c" rows="3" placeholder="Contenuto della notizia..."></textarea>
                    <button class="btn-p" onclick="addN()">PUBBLICA NEWS</button>
                </div>
                <h3 style="color:var(--red); text-align:center;">GESTIONE ROSA</h3>
                <div id="adm-list-giocatori"></div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('milanac_v37') || '{"ps":[], "ns":[], "albo":[]}');

        function toggleNav() { const n = document.getElementById('nav'); n.style.display = (n.style.display === 'flex') ? 'none' : 'flex'; }
        function showPage(p) { document.querySelectorAll('.page').forEach(x => x.classList.remove('active')); document.getElementById('page-'+p).classList.add('active'); toggleNav(); render(); }
        function login() { if(document.getElementById('adm-pass').value === 'milan') { document.getElementById('adm-box').style.display='block'; render(); } }
        function save() { localStorage.setItem('milanac_v37', JSON.stringify(db)); render(); }

        function addG() { 
            const n = document.getElementById('g-n').value, num = document.getElementById('g-num').value;
            if(n && num) { db.ps.push({id:Date.now(), n, num, g:0, a:0, p:0, v:[], in:false}); document.getElementById('g-n').value=''; document.getElementById('g-num').value=''; save(); } 
        }
        function addN() {
            const t = document.getElementById('n-t').value, c = document.getElementById('n-c').value;
            if(t && c) { db.ns.unshift({id:Date.now(), t, c, d:new Date().toLocaleDateString()}); document.getElementById('n-t').value=''; document.getElementById('n-c').value=''; save(); }
        }

        function setVoti(id) {
            let vts = [];
            for(let i=1; i<=5; i++) {
                let v = prompt("Admin " + i + " - Inserisci Voto:");
                if(v) vts.push(parseFloat(v.replace(',','.')));
            }
            if(vts.length) {
                let media = (vts.reduce((a,b)=>a+b,0)/vts.length).toFixed(2);
                db.ps.find(x=>x.id===id).v.push(parseFloat(media));
                save();
            }
        }

        function render() {
            // Home / Squadra
            document.getElementById('lista-giocatori').innerHTML = db.ps.map(p => {
                const m = p.v.length ? p.v[p.v.length-1] : "N/D";
                return `<div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>#${p.num} ${p.n.toUpperCase()}</b> 
                        <span class="gold-text">ULTIMO: ${m}</span>
                    </div>
                    <div class="stats-grid">
                        <span>P: ${p.p}</span> <span>G: ${p.g}</span> <span>A: ${p.a}</span>
                    </div>
                    <button class="btn-p" onclick="db.ps.find(x=>x.id===${p.id}).in=!db.ps.find(x=>x.id===${p.id}).in; save();" 
                    style="margin-top:10px; height:38px; font-size:11px; background:${p.in?'var(--red)':'#222'}">${p.in?'CONVOCATO':'ASSENTE'}</button>
                </div>`;
            }).join('');

            // Lavagna (Tutto il campo visibile)
            const pitch = document.getElementById('players-on-pitch'); pitch.innerHTML = '';
            db.ps.filter(p => p.in).forEach((p, i) => {
                const tok = document.createElement('div');
                tok.className = 'player-token';
                tok.innerHTML = `<div class="shirt">${p.num}</div><div class="p-name">${p.n.split(' ')[0]}</div>`;
                tok.style.left = '10px'; tok.style.top = (i * 42 + 20) + 'px';
                pitch.appendChild(tok);
                tok.addEventListener('touchmove', e => {
                    e.preventDefault(); let t = e.touches[0]; let r = document.getElementById('pitch-box').getBoundingClientRect();
                    tok.style.left = (t.pageX - r.left - 27) + 'px'; tok.style.top = (t.pageY - r.top - 20) + 'px';
                }, {passive: false});
            });

            // Notizie
            document.getElementById('lista-news').innerHTML = db.ns.map(n => `
                <div class="card">
                    <small class="gold-text">${n.d}</small>
                    <h3 style="margin:5px 0;">${n.t.toUpperCase()}</h3>
                    <p style="color:#ccc; font-size:14px; line-height:1.4;">${n.c}</p>
                </div>`).join('');

            // Ranking
            document.getElementById('ranking-list').innerHTML = [...db.ps].sort((a,b)=>(b.g+b.a)-(a.g+a.a)).map(p => `
                <div class="card" style="display:flex; justify-content:space-between;">
                    <span>#${p.num} ${p.n}</span> <b>${p.g+p.a} PUNTI</b>
                </div>`).join('');

            // Admin List (con Tasto Rimuovi)
            document.getElementById('adm-list-giocatori').innerHTML = db.ps.map(p => `
                <div class="card">
                    <b>${p.n} (#${p.num})</b>
                    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin-top:5px;">
                        <input type="number" onchange="db.ps.find(x=>x.id===${p.id}).p=parseInt(this.value);save()" value="${p.p}" placeholder="P">
                        <input type="number" onchange="db.ps.find(x=>x.id===${p.id}).g=parseInt(this.value);save()" value="${p.g}" placeholder="G">
                        <input type="number" onchange="db.ps.find(x=>x.id===${p.id}).a=parseInt(this.value);save()" value="${p.a}" placeholder="A">
                    </div>
                    <button onclick="setVoti(${p.id})" style="background:var(--gold); color:#000; padding:10px; border:none; width:100%; font-weight:bold; border-radius:4px; margin-top:5px; cursor:pointer;">MEDIA 5 ADMIN</button>
                    <button onclick="if(confirm('Eliminare definitivamente ${p.n}?')){db.ps=db.ps.filter(x=>x.id!==${p.id});save()}" style="color:red; background:none; border:1px solid red; width:100%; margin-top:10px; padding:5px; border-radius:4px; font-size:11px; cursor:pointer;">RIMUOVI GIOCATORE</button>
                </div>`).join('');
        }
        render();
    </script>
</body>
</html>

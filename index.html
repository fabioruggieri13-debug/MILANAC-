<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC</title>
    <link rel="icon" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        :root { --red: #ff0000; --bg: #000; }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* NAVIGAZIONE IN ALTO */
        .nav-top { display: flex; background: #080808; border-bottom: 2px solid var(--red); height: 60px; position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        .nav-btn { flex: 1; min-width: 80px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #555; font-weight: bold; text-transform: uppercase; border: none; background: none; }
        .nav-btn.active { color: #fff; border-bottom: 3px solid var(--red); background: #111; }

        .content { height: calc(100vh - 60px); overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .page { display: none; } .page.active { display: block; }

        /* CAMPO DA CALCIO REALE */
        #campo-container { 
            width: 100%; height: 400px; background: #1e4d2b; 
            border: 3px solid white; border-radius: 10px; position: relative; 
            margin: 10px 0; overflow: hidden; touch-action: none;
            background-image: 
                linear-gradient(rgba(255,255,255,0.2) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255,255,255,0.2) 2px, transparent 2px);
            background-size: 100% 50px, 50px 100%;
        }
        .area-rigore { position: absolute; bottom: 0; left: 25%; width: 50%; height: 60px; border: 2px solid white; border-bottom: none; }
        .centrocampo { position: absolute; top: 50%; left: 50%; width: 80px; height: 80px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); }
        .linea-metà { position: absolute; top: 50%; width: 100%; height: 2px; background: white; }

        .player-dot { 
            width: 50px; height: 50px; background: var(--red); color: white; 
            border-radius: 50%; position: absolute; display: flex; align-items: center; 
            justify-content: center; font-size: 10px; border: 2px solid white; 
            font-weight: bold; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            text-align: center; line-height: 1; padding: 2px; box-sizing: border-box;
        }

        /* CARTA FC26 ROSSONERA */
        .fc-card {
            width: 260px; height: 380px; margin: 10px auto; background: linear-gradient(135deg, #000 0%, #ff0000 50%, #000 100%);
            clip-path: polygon(10% 0, 90% 0, 100% 15%, 100% 85%, 50% 100%, 0 85%, 0 15%);
            position: relative; padding: 2px;
        }
        .fc-inner { background: #000; height: 100%; width: 100%; clip-path: inherit; position: relative; text-align: center; }
        .ovr { position: absolute; top: 35px; left: 25px; font-size: 50px; font-weight: 900; color: var(--red); }
        .p-name { margin-top: 180px; font-size: 24px; font-weight: 900; text-transform: uppercase; border-bottom: 2px solid var(--red); width: 80%; margin-left: 10%; }

        .card-ui { background: #111; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #222; }
        button { background: var(--red); color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 8px; }
        h1 { color: var(--red); text-align: center; text-transform: uppercase; font-size: 1.5rem; }
    </style>
</head>
<body>

    <nav class="nav-top">
        <button class="nav-btn active" onclick="tab('h', this)">LISTA</button>
        <button class="nav-btn" onclick="tab('t', this)">CAMPO</button>
        <button class="nav-btn" onclick="tab('p', this)">LA MIA CARTA</button>
        <button class="nav-btn" onclick="tab('s', this)">STATS</button>
        <button class="nav-btn" onclick="tab('a', this)">ADMIN</button>
    </nav>

            <h1>FORMAZIONE</h1>
            <div id="campo-container">
                <div class="linea-metà"></div>

                <div class="area-rigore"></div>
                <div id="nomi-campo"></div>
            </div>
            <button onclick="render()" style="background:#222;">RESET POSIZIONI</button>

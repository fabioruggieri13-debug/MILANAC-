<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC PRO CLUB - V69</title>
    <style>
        :root { --red: #C61C23; --bg: #000; --card: #121212; --gold: #D4AF37; --cyan: #00e5ff; --grass: #2e7d32; --grass-light: #388e3c; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* --- INTRODUZIONE BELLISSIMA E PULSANTE --- */
        #intro { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; text-align: center; }
        
        .pulse-orb {
            width: 120px; height: 120px; background: var(--red); border-radius: 50%;
            margin-bottom: 30px; position: relative;
            box-shadow: 0 0 50px var(--red);
            animation: pulse-glow 2s infinite ease-in-out;
        }
        
        @keyframes pulse-glow {
            0% { transform: scale(1); box-shadow: 0 0 40px var(--red); opacity: 0.8; }
            50% { transform: scale(1.15); box-shadow: 0 0 80px var(--red), 0 0 20px var(--gold); opacity: 1; }
            100% { transform: scale(1); box-shadow: 0 0 40px var(--red); opacity: 0.8; }
        }

        .title-main { font-size: 3.5rem; font-weight: 900; letter-spacing: -3px; margin: 0; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .title-sub { color: var(--gold); font-weight: bold; letter-spacing: 8px; margin-bottom: 50px; font-size: 1.1rem; text-transform: uppercase; }

        .btn-start { 
            background: transparent; color: white; border: 2px solid var(--red); padding: 15px 50px; 
            border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; 
            transition: 0.4s; letter-spacing: 2px;
        }
        .btn-start:hover { background: var(--red); box-shadow: 0 0 30px var(--red); }

        /* --- HEADER --- */
        header { height: 65px; background: #080808; border-bottom: 2px solid var(--red); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: relative; z-index: 2000; }
        .burger { font-size: 30px; color: var(--red); cursor: pointer; }
        
        .nav-menu { position: absolute; top: 65px; right: 0; background: #0a0a0a; width: 260px; display: none; flex-direction: column; border-left: 2px solid var(--red); height: calc(100vh - 65px); z-index: 1900; }
        .nav-menu button { background: none; border: none; color: white; padding: 18px; text-align: left; border-bottom: 1px solid #1a1a1a; font-weight: bold; text-transform: uppercase; font-size: 12px; }

        /* --- LAYOUT --- */
        .container { height: calc(100vh - 65px); overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .page { display: none; } .active { display: block; }

        /* --- CARDS --- */
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 5px solid var(--red); }
        .market-val { float: right; color: #4caf50; font-weight: 900; font-size: 1.1rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 10px; }
        .stat-box { background: #1a1a1a; padding: 8px; border-radius: 6px; text-align: center; }
        .stat-box small { font-size: 9px; color: #888; display: block; }

        .badge { font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: 900; text-transform: uppercase; margin-right: 5px; }
        .potm { background: var(--gold); color: #000; }
        .mvp { background: var(--cyan); color: #000; }

        /* --- CAMPO --- */
        .pitch-wrap { width: 100%; display: flex; justify-content: center; }
        #pitch { 
            width: 90vw; height: 130vw; max-height: 480px; background: var(--grass); border: 2px solid #fff; position: relative; overflow: hidden; touch-action: none;
            background-image: repeating-linear-gradient(0deg, var(--grass), var(--grass) 10%, var(--grass-light) 10%, var(--grass-light) 20%);
        }
        .linea-m { position: absolute; width: 100%; height: 2px; background: #fff; top: 50%; opacity: 0.6; }
        .cerchio-m { position: absolute; width: 70px; height: 70px; border: 2px solid #fff; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.6; }

        .token { position: absolute; width: 50px; text-align: center; z-index: 100; }
        .shirt { width: 40px; height: 40px; background: #000; border: 2px solid var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; margin: 0 auto; }
        .token-name { background: rgba(0,0,0,0.8); font-size: 9px; padding: 2px 4px; border-radius: 3px; margin-top: 3px; display: inline-block; white-space: nowrap; }

        input, textarea { width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #333; color: #fff; margin-bottom: 10px; border-radius: 6px; }
        .btn-red { background: var(--red); color: white; border: none; padding: 14px; border-radius: 6px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

    <div id="intro">
        <div class="pulse-orb"></div>
        <h1 class="title-main">MILANAC</h1>
        <p class="title-sub">PRO CLUB</p>
        <button class="btn-start" onclick="startApp()">Entra nell'Arena</button>
    </div>

    <header>
        <div style="font-weight:900; color:var(--red); font-size:22px; letter-spacing:-1px">MILANAC</div>
        <div class="burger" onclick="toggleNav()">☰</div>
        <nav id="nav" class="nav-menu">
            <button onclick="showPage('rosa')">Squadra</button>
            <button onclick="showPage('tattica')">Lavagna Tattica</button>
            <button onclick="showPage('mercato')">Valore Mercato</button>
            <button onclick="showPage('premi')">Bacheca Premi</button>
            <button onclick="showPage('news')">News</button>
            <button onclick="showPage('admin')">Admin</button>
        </nav>
    </header>

    <div class="container">
        <div id="p-rosa" class="page active">
            <h2 style="text-align:center">PLAYER LIST</h2>
            <div id="list-rosa"></div>
        </div>

        <div id="p-tattica" class="page">
            <h2 style="text-align:center">FORMAZIONE</h2>
            <div class="pitch-wrap">
                <div id="pitch">
                    <div class="linea-m"></div>
                    <div class="cerchio-m"></div>
                    <div id="pitch-players"></div>
                </div>
            </div>
        </div>

        <div id="p-mercato" class="page">
            <h2 style="text-align:center; color: #4caf50;">TOP VALORE</h2>
            <div id="list-market"></div>
        </div>

        <div id="p-premi" class="page">
            <h2 style="text-align:center; color: var(--gold);">PREMI INDIVIDUALI</h2>
            <div id="list-premi"></div>
        </div>

        <div id="p-news" class="page">
            <h2 style="text-align:center">NOTIZIE</h2>
            <div id="list-news"></div>
        </div>

        <div id="p-admin" class="page">
            <h2 style="text-align:center">PANNELLO ADMIN</h2>
            <input type="password" id="adm-pass" placeholder="Password (milan)">
            <button class="btn-red" onclick="login()">ACCEDI</button>
            <div id="adm-panel" style="display:none; margin-top:20px;">
                <div class="card">
                    <input type="text" id="new-n" placeholder="Nome"><input type="number" id="new-m" placeholder="Maglia">
                    <button class="btn-red" onclick="addPlayer()">AGGIUNGI PLAYER</button>
                </div>
                <div class="card">
                    <input type="text" id="new-nt" placeholder="Titolo News"><textarea id="new-nb" placeholder="Testo..."></textarea>
                    <button class="btn-red" onclick="addNews()">PUBBLICA</button>
                </div>
                <div id="adm-list-players"></div>
            </div>
        </div>
    </div>

    <script>
        let db = { ps: [], ns: [] };

        function load() {
            const saved = localStorage.getItem('milanac_v69');
            if(saved) db = JSON.parse(saved);
        }

        function startApp() { document.getElementById('intro').style.display='none'; render(); }
        function toggleNav() { const n = document.getElementById('nav'); n.style.display = (n.style.display==='flex')?'none':'flex'; }
        function showPage(p) { document.querySelectorAll('.page').forEach(x=>x.classList.remove('active')); document.getElementById('p-'+p).classList.add('active'); toggleNav(); render(); }
        function login() { if(document.getElementById('adm-pass').value === 'milan') document.getElementById('adm-panel').style.display='block'; }
        function save() { localStorage.setItem('milanac_v69', JSON.stringify(db)); render(); }

        function addPlayer() {
            const n = document.getElementById('new-n').value, m = document.getElementById('new-m').value;
            if(n && m) { db.ps.push({id:Date.now(), n, m, p:0, g:0, a:0, v:[], potm:0, mvp:0, in:false}); save(); }
        }

        function addNews() {
            const t = document.getElementById('new-nt').value, b = document.getElementById('new-nb').value;
            if(t && b) { db.ns.unshift({t, b, d: new Date().toLocaleDateString()}); save(); }
        }

        function getValore(p) {
            let base = 10 + (p.g * 5) + (p.a * 3) + (p.p * 1) + (p.potm * 10) + (p.mvp * 15);
            if(p.v.length > 0) base *= ((p.v.reduce((a,b)=>a+b,0) / p.v.length) / 6);
            return base.toFixed(1);
        }

        function render() {
            // LISTA ROSA
            document.getElementById('list-rosa').innerHTML = db.ps.map(p => `
                <div class="card">
                    <span class="market-val">€${getValore(p)}M</span>
                    <b>#${p.m} ${p.n.toUpperCase()}</b>
                    <div class="stats-grid">
                        <div class="stat-box"><small>P</small><b>${p.p}</b></div><div class="stat-box"><small>G</small><b>${p.g}</b></div>
                        <div class="stat-box"><small>A</small><b>${p.a}</b></div><div class="stat-box"><small>MV</small><b>${p.v.length?(p.v.reduce((a,b)=>a+b,0)/p.v.length).toFixed(1):'-'}</b></div>
                    </div>
                    <button class="btn-red" style="margin-top:10px; background:${p.in?'var(--red)':'#333'}" onclick="db.ps.find(x=>x.id===${p.id}).in=!db.ps.find(x=>x.id===${p.id}).in; save();">${p.in?'CONVOCATO':'NON CONVOCATO'}</button>
                </div>`).join('');

            // PAGINA MERCATO
            document.getElementById('list-market').innerHTML = [...db.ps].sort((a,b)=>getValore(b)-getValore(a)).map((p,i)=>`
                <div class="card"><b>${i+1}. ${p.n}</b> <span class="market-val">€${getValore(p)}M</span></div>`).join('');

            // PAGINA PREMI
            document.getElementById('list-premi').innerHTML = db.ps.filter(p=>p.potm>0 || p.mvp>0).map(p=>`
                <div class="card">
                    <b>${p.n}</b><br><br>
                    ${p.potm?`<span class="badge potm">PLAYER OF THE MONTH x${p.potm}</span>`:''}
                    ${p.mvp?`<span class="badge mvp">MOST VALUABLE PLAYER x${p.mvp}</span>`:''}
                </div>`).join('') || '<p style="text-align:center">Nessun premio assegnato</p>';

            document.getElementById('list-news').innerHTML = db.ns.map(n=>`<div class="card"><small>${n.d}</small><h3>${n.t}</h3><p>${n.b}</p></div>`).join('');

            // LAVAGNA
            const area = document.getElementById('pitch-players'); area.innerHTML = '';
            db.ps.filter(p=>p.in).forEach((p,i)=>{
                const t = document.createElement('div'); t.className='token'; t.style.left='20px'; t.style.top=(i*50+10)+'px';
                t.innerHTML=`<div class="shirt">${p.m}</div><div class="token-name">${p.n}</div>`;
                area.appendChild(t);
                t.ontouchmove = e => { e.preventDefault(); let x=e.touches[0], r=document.getElementById('pitch').getBoundingClientRect(); t.style.left=(x.pageX-r.left-25)+'px'; t.style.top=(x.pageY-r.top-20)+'px'; };
            });

            // ADMIN LIST
            document.getElementById('adm-list-players').innerHTML = db.ps.map(p => `
                <div class="card">
                    <b>${p.n} (#${p.m})</b>
                    <div style="display:flex; gap:5px; margin:10px 0">
                        <input type="number" value="${p.p}" onchange="db.ps.find(x=>x.id===${p.id}).p=parseInt(this.value);save()">
                        <input type="number" value="${p.g}" onchange="db.ps.find(x=>x.id===${p.id}).g=parseInt(this.value);save()">
                        <input type="number" value="${p.a}" onchange="db.ps.find(x=>x.id===${p.id}).a=parseInt(this.value);save()">
                    </div>
                    <div style="display:flex; gap:5px; margin-bottom:5px">
                        <button onclick="db.ps.find(x=>x.id===${p.id}).potm++;save()" style="flex:1; background:var(--gold); border:none; padding:8px; border-radius:4px">POTM</button>
                        <button onclick="db.ps.find(x=>x.id===${p.id}).mvp++;save()" style="flex:1; background:var(--cyan); border:none; padding:8px; border-radius:4px">MVP</button>
                    </div>
                    <button class="btn-red" style="background:#444; margin-bottom:5px" onclick="let v=prompt('Voto:'); if(v){db.ps.find(x=>x.id===${p.id}).v.push(parseFloat(v));save()}">AGGIUNGI VOTO</button>
                    <button onclick="if(confirm('Elimina?')){db.ps=db.ps.filter(x=>x.id!==${p.id});save()}" style="color:red; background:none; border:none; width:100%; font-size:10px;">ELIMINA</button>
                </div>`).join('');
        }
        load();
    </script>
</body>
</html>

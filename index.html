<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILANAC Pro</title>
    <style>
        :root { --neon: #ff0000; --bg: #000000; --card: #121212; --field: #0a2e18; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        
        /* Navigazione */
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; border-top: 1px solid #333; height: 70px; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #777; text-decoration: none; font-size: 10px; font-weight: bold; }
        .tab-item.active { color: var(--neon); }
        .tab-icon { font-size: 22px; margin-bottom: 3px; }

        /* Contenitore Pagine */
        .content { height: calc(100vh - 70px); overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .page { display: none; }
        .page.active { display: block; }

        /* Card e UI */
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; }
        h1 { color: var(--neon); text-align: center; margin: 10px 0; font-size: 1.5rem; letter-spacing: 2px; }
        button { background: var(--neon); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        
        /* Campo Tattico */
        #tacticalField { width: 100%; height: 70vh; background: var(--field); border-radius: 10px; position: relative; border: 2px solid #ffffff33; overflow: hidden; touch-action: none; }
        .player-token { width: 44px; height: 44px; background: var(--neon); color: white; border-radius: 50%; position: absolute; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; border: 2px solid white; z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        /* Liste */
        .row { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid #333; }
        .row.present { border-left-color: var(--neon); }
        .btn-status { width: auto; padding: 6px 12px; font-size: 10px; }
    </style>
</head>
<body>

    <div class="content">
        <div id="page-hub" class="page active">
            <h1>MILANAC HUB</h1>
            <div class="card">
                <h2 style="font-size: 14px; margin-top:0">APPELLO RAPIDO</h2>
                <div id="list-hub"></div>
            </div>
        </div>

        <div id="page-tactic" class="page">
            <div id="tacticalField"></div>
            <button onclick="render()" style="margin-top:10px; background:#333">RESET POSIZIONI</button>
        </div>

        <div id="page-rosa" class="page">
            <h1>LA ROSA</h1>
            <div id="list-rosa" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
        </div>

        <div id="page-admin" class="page">
            <h1>GESTIONE</h1>
            <div class="card">
                <input type="text" id="new-name" placeholder="Gamertag" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:none; background:#222; color:white">
                <select id="new-role" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; background:#222; color:white; border:none">
                    <option value="ATT">ATT</option><option value="CC">CC</option><option value="DIF">DIF</option><option value="POR">POR</option>
                </select>
                <button onclick="addPlayer()">AGGIUNGI PLAYER</button>
            </div>
            <div id="list-admin"></div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="nav('hub')"><span class="tab-icon">🏠</span>HUB</div>
        <div class="tab-item" onclick="nav('tactic')"><span class="tab-icon">📋</span>TATTICA</div>
        <div class="tab-item" onclick="nav('rosa')"><span class="tab-icon">👤</span>ROSA</div>
        <div class="tab-item" onclick="nav('admin')"><span class="tab-icon">⚙️</span>ADMIN</div>
    </div>

    <script>
        let players = JSON.parse(localStorage.getItem('milanac_db') || "[]");

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
            event.currentTarget.classList.add('active');
            render();
        }

        function addPlayer() {
            const n = document.getElementById('new-name').value;
            const r = document.getElementById('new-role').value;
            if(!n) return;
            players.push({ id: Date.now(), name: n, role: r, in: false });
            document.getElementById('new-name').value = "";
            save();
        }

        function toggle(id) {
            const p = players.find(x => x.id === id);
            p.in = !p.in;
            save();
        }

        function del(id) {
            players = players.filter(p => p.id !== id);
            save();
        }

        function save() {
            localStorage.setItem('milanac_db', JSON.stringify(players));
            render();
        }

        function render() {
            // HUB
            document.getElementById('list-hub').innerHTML = players.map(p => `
                <div class="row ${p.in?'present':''}">
                    <span>${p.name} <small>(${p.role})</small></span>
                    <button class="btn-status" onclick="toggle(${p.id})" style="background:${p.in?'#ff0000':'#333'}">${p.in?'IN':'OUT'}</button>
                </div>
            `).join('');

            // TATTICA
            const field = document.getElementById('tacticalField');
            field.innerHTML = '';
            players.filter(p => p.in).forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'player-token';
                div.innerText = p.name.substring(0,3).toUpperCase();
                div.style.left = '20px';
                div.style.top = (i * 50 + 20) + 'px';
                field.appendChild(div);
                dragElement(div);
            });

            // ROSA
            document.getElementById('list-rosa').innerHTML = players.map(p => `
                <div class="card" style="text-align:center; margin-bottom:0">
                    <div style="font-size:24px">👤</div>
                    <div style="font-size:12px; font-weight:bold">${p.name}</div>
                    <div style="font-size:10px; color:red">${p.role}</div>
                </div>
            `).join('');

            // ADMIN
            document.getElementById('list-admin').innerHTML = players.map(p => `
                <div class="row">
                    <span>${p.name}</span>
                    <button onclick="del(${p.id})" style="width:auto; background:#444; padding:5px 10px">ELIMINA</button>
                </div>
            `).join('');
        }

        function dragElement(el) {
            let x = 0, y = 0;
            el.ontouchmove = e => {
                e.preventDefault();
                let t = e.touches[0];
                let b = document.getElementById('tacticalField').getBoundingClientRect();
                el.style.left = (t.pageX - b.left - 22) + 'px';
                el.style.top = (t.pageY - b.top - 22) + 'px';
            };
        }

        window.onload = render;
    </script>
</body>
</html>
